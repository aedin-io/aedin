      ).join('');
      const actions = `<div style="margin-top:12px;display:flex;gap:8px">
        <button onclick="action(${data.id}, 'accept', this)" style="padding:6px 14px;background:var(--nature-700,#2f6a31);color:white;border:none;border-radius:4px;cursor:pointer">&#10003; Accept (&#8594; human_verified)</button>
        <button onclick="action(${data.id}, 'reject', this)" style="padding:6px 14px;background:#c0392b;color:white;border:none;border-radius:4px;cursor:pointer">&#10005; Reject (&#8594; human_rejected)</button>
        <button onclick="action(${data.id}, 'flag', this)" style="padding:6px 14px;background:#e6b800;color:#333;border:none;border-radius:4px;cursor:pointer">&#9872; Flag</button>
      </div>`;
      const gridCols = isLightbox
        ? 'minmax(0,2fr) minmax(0,1fr)'
        : 'minmax(0,2fr) minmax(0,1fr) minmax(0,1.5fr)';
      const pdfCol = isLightbox ? '' : renderPdfBlock(data);
      return `
        <div style="display:grid;grid-template-columns:${gridCols};gap:24px${isLightbox ? ';flex:1;min-height:0' : ''}">
          <div${isLightbox ? ' style="overflow-y:auto"' : ''}>
            <div style="font-size:11px;font-weight:600;color:var(--earth-700);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Source Quote${data.source_page ? ` (page ${data.source_page})` : ''}</div>
            <div style="margin-bottom:14px;padding:8px;background:white;border-radius:4px;font-style:italic;line-height:1.4;font-size:13px">${esc(data.source_quote || '(no quote)')}</div>
            <div style="font-size:11px;font-weight:600;color:var(--earth-700);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Claim Summary</div>
            <table style="font-size:12px;width:100%">${summaryRows}</table>
            ${data.staging_id ? `<div style="margin-top:8px;font-size:11px">From staging row #${data.staging_id} &middot; ${stagingLink}</div>` : ''}
          </div>
          <div${isLightbox ? ' style="overflow-y:auto"' : ''}>
            <div style="font-size:11px;font-weight:600;color:var(--earth-700);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Critic Verdicts</div>
            ${renderCriticsTrail(data.critic_verdicts)}
          </div>
          ${pdfCol}
        </div>
        ${actions}
      `;
    }

    function renderTraitDetail(data, opts = {}) {
      const isLightbox = !!opts.lightbox;
      const stagingLink = data.staging_id
        ? `<a href="#" onclick="viewStagingFromClaim(${data.staging_id});return false;" style="color:var(--earth-700)">View in Verify &#8594;</a>`
        : '';
      const valueDisplay =
        data.value_numeric != null ? esc(String(data.value_numeric)) :
        data.value_text ? esc(data.value_text) :
        data.value_json ? `<code>${esc(data.value_json)}</code>` : '<span style="color:#aaa">&#8212;</span>';
      const summaryRows = [
        ['Entity',  data.entity_scientific_name],
        ['Trait',   data.trait_name],
        ['Value',   valueDisplay],
        ['Unit',    data.unit],
        ['Region',  data.region]
      ].filter(([, v]) => v).map(([k, v]) =>
        `<tr><td style="font-weight:600;color:var(--earth-700);padding-right:12px;width:1%;white-space:nowrap">${k}</td><td>${(typeof v === 'string' && v.startsWith('<')) ? v : esc(String(v))}</td></tr>`
      ).join('');
      const actions = `<div style="margin-top:12px;display:flex;gap:8px">
        <button onclick="actionTrait(${data.id}, 'accept', this)" style="padding:6px 14px;background:var(--nature-700,#2f6a31);color:white;border:none;border-radius:4px;cursor:pointer">&#10003; Accept (&#8594; human_verified)</button>
        <button onclick="actionTrait(${data.id}, 'reject', this)" style="padding:6px 14px;background:#c0392b;color:white;border:none;border-radius:4px;cursor:pointer">&#10005; Reject (&#8594; human_rejected)</button>
      </div>`;
      const gridCols = isLightbox
        ? 'minmax(0,2fr) minmax(0,1fr)'
        : 'minmax(0,2fr) minmax(0,1fr) minmax(0,1.5fr)';
      const pdfCol = isLightbox ? '' : renderPdfBlock(data);
      return `
        <div style="display:grid;grid-template-columns:${gridCols};gap:24px${isLightbox ? ';flex:1;min-height:0' : ''}">
          <div${isLightbox ? ' style="overflow-y:auto"' : ''}>
            <div style="font-size:11px;font-weight:600;color:var(--earth-700);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Source Quote${data.source_page ? ` (page ${data.source_page})` : ''}</div>
            <div style="margin-bottom:14px;padding:8px;background:white;border-radius:4px;font-style:italic;line-height:1.4;font-size:13px">${esc(data.source_quote || '(no quote)')}</div>
            <div style="font-size:11px;font-weight:600;color:var(--earth-700);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Trait Summary</div>
            <table style="font-size:12px;width:100%">${summaryRows}</table>
            ${data.staging_id ? `<div style="margin-top:8px;font-size:11px">From staging row #${data.staging_id} &middot; ${stagingLink}</div>` : ''}
          </div>
          <div${isLightbox ? ' style="overflow-y:auto"' : ''}>
            <div style="font-size:11px;font-weight:600;color:var(--earth-700);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Critic Verdicts</div>
            ${renderCriticsTrail(data.critic_verdicts)}
          </div>
          ${pdfCol}
        </div>
        ${actions}
      `;
    }

    window.viewStagingFromClaim = function(stagingId) {
      state.topTab = 'ingest';
      state.tab = 'staging';
      state.page = 1;
      state.filters.staging = { ...state.filters.staging, search: String(stagingId) };
      if (typeof urlState !== 'undefined') urlState.push('push');
      if (typeof applyNav === 'function') applyNav();
    };

    window.actionTrait = async function(traitId, action, btn) {
      const url = `/api/admin/review/entity-traits/${traitId}`;
      const reviewStatus = action === 'accept' ? 'human_verified' : action === 'reject' ? 'human_rejected' : 'disputed';
      try {
        const res = await fetch(url, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ review_status: reviewStatus })
        });
        if (!res.ok) throw new Error(await res.text().catch(() => 'unknown'));
        // Auto-close any open lightbox so the partner returns to the refreshed table
        document.querySelectorAll('.pdf-overlay').forEach(o => o.remove());
        if (typeof load === 'function') await load();
      } catch (err) {
        alert('Failed to update trait: ' + err.message);
      }
    };

    window.toggleStagingExpand = function(stagingId, toggleEl) {
      const tr = document.querySelector(`#rows tr[data-id="${stagingId}"]`);
      if (!tr) { console.warn('toggleStagingExpand: row not found', stagingId); return; }
      const next = tr.nextElementSibling;
      // If the very next row is already the expanded panel for this row, close it.
      if (next && next.classList.contains('staging-expanded') && next.dataset.parentId === String(stagingId)) {
        next.remove();
        toggleEl.innerHTML = '&#9658;';
        return;
      }
      // Decode row data from the DOM attribute — no dependency on state.lastResponse cache.
      let data;
      try {
        const raw = decodeURIComponent(escape(atob(tr.dataset.stagingRow)));
        data = JSON.parse(raw);
      } catch (err) {
        console.error('toggleStagingExpand: cannot decode row data', err);
        return;
      }
      const panel = document.createElement('tr');
      panel.className = 'staging-expanded';
      panel.dataset.parentId = String(stagingId);
      const colspan = tr.children.length;
      panel.innerHTML = `<td colspan="${colspan}" style="background:rgba(47,106,49,0.04);padding:14px 18px;border-bottom:2px solid var(--nature-200,#c5dfc6)">${renderStagingDetail(data)}</td>`;
      panel.dataset.stagingIdDetail = String(stagingId);
      tr.after(panel);
      toggleEl.innerHTML = '&#9660;';
      // Load and stamp any existing per-field corrections
      setTimeout(() => loadAndApplyCorrections(stagingId), 0);
    };

    function renderStagingDetail(s, opts = {}) {
      const isLightbox = !!opts.lightbox;
      // Parse payload JSON for display
      let payload = {};
      try { payload = typeof s.payload === 'string' ? JSON.parse(s.payload) : (s.payload || {}); } catch { payload = { _raw: s.payload }; }
      const reviewableFields = Object.entries(payload).filter(([k, v]) => !k.startsWith('_') && v !== null && v !== '');

      // Helper: detect entity-name fields that get scientific-name autocomplete
      const isEntityField = k => /^(subject|object)_(scientific_name|common_name|name)$/.test(k) || k === 'scientific_name' || k === 'pest_scientific_name' || k === 'crop';

      // Build per-field interactive rows
      const payloadRows = reviewableFields.map(([k, v]) => {
        const valueStr = typeof v === 'object' ? JSON.stringify(v) : String(v);
        const isEntity = isEntityField(k);
        const dlId = `dl-${s.id}-${k}`;
        const focusHandler = isEntity
          ? `this.style.border='1px solid rgba(47,106,49,0.4)';this.style.background='white';loadEntitySuggestions(this,'${dlId}')`
          : `this.style.border='1px solid rgba(47,106,49,0.4)';this.style.background='white'`;
        const inputHandler = isEntity ? `loadEntitySuggestions(this,'${dlId}')` : '';
        return `<tr data-field-path="${esc(k)}">
          <td style="font-weight:600;padding:2px 0 2px 0;color:var(--earth-700);white-space:nowrap;vertical-align:middle;padding-right:10px;width:1%">${esc(k)}</td>
          <td style="vertical-align:middle">
            <input class="field-edit" data-staging-id="${s.id}" data-field-path="${esc(k)}"
                   ${isEntity ? `list="${dlId}"` : ''}
                   value="${esc(valueStr)}"
                   style="width:100%;padding:3px 6px;border:1px solid transparent;background:transparent;font-size:12px;border-radius:3px;box-sizing:border-box"
                   onfocus="${focusHandler}"
                   ${inputHandler ? `oninput="${inputHandler}"` : ''}
                   onblur="commitFieldEdit(this);this.style.border='1px solid transparent';this.style.background='transparent'" />
            ${isEntity ? `<datalist id="${dlId}"></datalist>` : ''}
          </td>
          <td style="width:1%;white-space:nowrap;padding-left:6px;vertical-align:middle">
            <span class="field-correction-pill" data-field-path="${esc(k)}" style="display:none;font-size:10px;padding:2px 6px;border-radius:3px;margin-right:4px;vertical-align:middle"></span>
            <button onclick="markFieldCorrect(${s.id},'${esc(k)}')" title="Field is correct as-is"
                    style="padding:2px 7px;background:transparent;border:1px solid var(--nature-700,#2f6a31);color:var(--nature-700,#2f6a31);border-radius:3px;cursor:pointer;font-size:11px">&#10003;</button>
            <button onclick="markFieldRejected(${s.id},'${esc(k)}')" title="Field value is wrong"
                    style="margin-left:3px;padding:2px 7px;background:transparent;border:1px solid #c0392b;color:#c0392b;border-radius:3px;cursor:pointer;font-size:11px">&#10005;</button>
          </td>
        </tr>`;
      }).join('') || '<tr><td colspan="3" style="color:#aaa;font-style:italic">empty payload</td></tr>';

      // Parse critic verdicts (newline-separated, pipe-delimited fields)
      const critics = (s.critic_verdicts || '').split('\n').filter(Boolean).map(line => {
        const parts = line.split('|');
        const name = parts[0] || '';
        const verdict = parts[1] || '';
        const reasoning = parts[2] || '';
        const confidence = parts[3] || '';
        const strength = parts[4] || '';
        if (!name) return '';
        const conf = confidence ? ` <span style="color:var(--earth-700)">(conf ${parseFloat(confidence).toFixed(2)})</span>` : '';
        const str = strength ? ` <span style="color:var(--earth-700)">[${esc(strength)}]</span>` : '';
        const cls = verdict === 'plausible' ? 'human_verified' : verdict === 'implausible' ? 'human_rejected' : verdict === 'uncertain' ? 'disputed' : 'ai_reviewed';
        return `<div style="margin:4px 0">
          <span class="pill ${cls}">${esc(name)}: ${esc(verdict)}</span>${conf}${str}
          ${reasoning ? `<div style="margin:2px 0 0 8px;color:var(--earth-700);font-style:italic;font-size:12px">&#8212; ${esc(reasoning)}</div>` : ''}
        </div>`;
      }).join('') || '<div style="color:#aaa;font-style:italic;font-size:12px">no critic verdicts yet</div>';

      // Promoted destination block
      const dest = s.promoted_destination;
      const destBlock = dest
        ? `<div style="margin:8px 0;padding:6px 10px;background:rgba(47,106,49,0.10);border-left:3px solid var(--nature-700,#2f6a31);border-radius:3px">
             <strong>Promoted</strong> &#8212; now live as <code>${esc(dest.table)}</code> <code>#${dest.id}</code>
             <a href="#" onclick="viewInDatabase('${esc(dest.table)}', ${dest.id});return false;" style="margin-left:8px;color:var(--nature-700)">View in Database &#8594;</a>
           </div>`
        : '';

      // Inline action buttons (whole-row Accept/Reject/Flag still available)
      const actions = `<div id="actions-bar-${s.id}" style="margin-top:12px;display:flex;gap:8px;align-items:center">
        <button id="accept-btn-${s.id}" onclick="actionStaging(${s.id}, 'accept', this)" style="padding:6px 14px;background:var(--nature-700,#2f6a31);color:white;border:none;border-radius:4px;cursor:pointer">&#10003; Accept</button>
        <button onclick="actionStagingPrompt(${s.id}, 'reject', this)" style="padding:6px 14px;background:#c0392b;color:white;border:none;border-radius:4px;cursor:pointer">&#10005; Reject</button>
        <button onclick="actionStagingPrompt(${s.id}, 'flag', this)"   style="padding:6px 14px;background:#e6b800;color:#333;border:none;border-radius:4px;cursor:pointer">&#9872; Flag</button>
        <span id="auto-promote-banner-${s.id}" style="display:none;font-size:12px;padding:4px 10px;background:rgba(47,106,49,0.12);color:var(--nature-700,#2f6a31);border-radius:4px"></span>
      </div>`;

      const sDataB64 = btoa(unescape(encodeURIComponent(JSON.stringify(s))));
      let pdfBlock;
      if (isLightbox) {
        pdfBlock = '';
      } else if (s.source_has_pdf && s.source_id) {
        const sSearchPart = pdfSearchParam(s.source_quote);
        pdfBlock = `<div style="display:flex;flex-direction:column;min-height:0">
            <div style="font-size:11px;font-weight:600;color:var(--earth-700);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;flex:0 0 auto">Source PDF (page ${esc(String(s.source_page || '?'))})</div>
            <div style="position:relative;flex:1 1 auto;min-height:500px;border:1px solid rgba(47,106,49,0.2);border-radius:4px;overflow:hidden;background:white">
              <iframe src="${pdfjsUrl(s.source_id, s.source_page || 1, sSearchPart)}"
                      style="width:100%;height:100%;border:0;display:block" title="Source page ${esc(String(s.source_page || ''))}"></iframe>
              <button onclick="enlargeSourcePdf(${s.source_id}, ${s.source_page || 1}, '${sDataB64}')"
                      style="position:absolute;top:6px;right:6px;background:rgba(47,106,49,0.9);color:white;border:none;border-radius:3px;padding:3px 8px;font-size:11px;cursor:pointer">&#x26F6; Enlarge</button>
            </div>
          </div>`;
      } else {
        pdfBlock = `<div>
            <div style="font-size:11px;font-weight:600;color:var(--earth-700);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Source PDF</div>
            <div style="color:#aaa;font-style:italic;font-size:12px">no PDF available for this source</div>
          </div>`;
      }

      const gridCols = isLightbox
        ? 'minmax(0,2fr) minmax(0,1fr)'
        : 'minmax(0,2fr) minmax(0,1fr) minmax(0,1.5fr)';

      return `
        <div style="display:grid;grid-template-columns:${gridCols};gap:24px${isLightbox ? ';flex:1;min-height:0' : ''}">
          <div${isLightbox ? ' style="overflow-y:auto"' : ''}>
            <div style="font-size:11px;font-weight:600;color:var(--earth-700);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Source Quote${s.source_page ? ` (page ${esc(String(s.source_page))})` : ''}</div>
            <div style="margin-bottom:14px;padding:8px 10px;background:white;border-radius:4px;font-style:italic;line-height:1.5;font-size:13px;border:1px solid var(--nature-200,#c5dfc6)">${esc(s.source_quote || s.extracted_claim || '(no quote)')}</div>
            <div style="font-size:11px;font-weight:600;color:var(--earth-700);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Extracted Payload &#8212; click &#10003; if correct, &#10005; if wrong, or edit inline</div>
            <table style="font-size:12px;width:100%;border-collapse:collapse">${payloadRows}</table>
          </div>
          <div${isLightbox ? ' style="overflow-y:auto"' : ''}>
            <div style="font-size:11px;font-weight:600;color:var(--earth-700);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Critic Verdicts</div>
            ${critics}
          </div>
          ${pdfBlock}
        </div>
        ${destBlock}
        ${actions}
      `;
    }

    window.enlargeSourcePdf = function(sourceId, page, dataB64) {
      const existing = document.querySelector('.pdf-overlay');
      if (existing) existing.remove();

      let data = null;
      if (dataB64) {
        try { data = JSON.parse(decodeURIComponent(escape(atob(dataB64)))); } catch (err) { console.warn('enlargeSourcePdf: cannot decode data', err); }
      }

      const overlay = document.createElement('div');
      overlay.className = 'pdf-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;flex-direction:column';

      const topBar = `
        <div style="padding:8px 16px;background:white;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(0,0,0,0.1)">
          <strong>Source — page ${page}</strong>
          ${data && data.source_title ? `<span style="color:var(--earth-700);font-size:12px;font-weight:normal">· ${esc(data.source_title)}</span>` : ''}
          <button onclick="this.closest('.pdf-overlay').remove()" style="margin-left:auto;padding:4px 12px;background:var(--nature-700,#2f6a31);color:white;border:none;border-radius:3px;cursor:pointer">Close ✕</button>
        </div>`;

      // Detect row type and render the corresponding detail content without the embedded PDF
      let sidebarHTML = '';
      if (data) {
        const isStaging = data.payload != null;
        const isClaim   = !isStaging && (!!data.relation || !!data.subject);
        const isTrait   = !isStaging && !isClaim && !!data.trait_name;
        if (isStaging)    sidebarHTML = renderStagingDetail(data, { lightbox: true });
        else if (isClaim) sidebarHTML = renderClaimDetail(data, { lightbox: true });
        else if (isTrait) sidebarHTML = renderTraitDetail(data, { lightbox: true });
      }

      // Layout: sidebar LEFT (min 480px, ~1fr), PDF RIGHT (~1.5fr)
      const lightboxSearchPart = data && data.source_quote ? pdfSearchParam(data.source_quote) : '';
      const body = sidebarHTML
        ? `<div style="flex:1;display:grid;grid-template-columns:minmax(480px,1fr) minmax(0,1.5fr);gap:0;min-height:0">
             <div style="background:white;overflow-y:auto;padding:16px;border-right:1px solid rgba(0,0,0,0.1);display:flex;flex-direction:column">${sidebarHTML}</div>
             <iframe src="${pdfjsUrl(sourceId, page, lightboxSearchPart)}" style="width:100%;height:100%;border:0;background:white" title="Source PDF"></iframe>
           </div>`
        : `<iframe src="${pdfjsUrl(sourceId, page, lightboxSearchPart)}" style="flex:1;width:100%;border:0;background:white" title="Source PDF"></iframe>`;

      overlay.innerHTML = topBar + body;
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);

      // After mounting, sync field-correction pills in the lightbox to existing state for staging rows
      if (data && data.id && data.payload != null) {
        setTimeout(() => loadAndApplyCorrections(data.id), 0);
      }
    };

    // renderLightboxSidebar removed — enlargeSourcePdf now delegates to
    // renderStagingDetail / renderClaimDetail / renderTraitDetail with opts.lightbox=true.

    window.viewInDatabase = function(table, id) {
      const tabKey = table === 'claims' ? 'claims' : table === 'entity_traits' ? 'entity_traits' : 'entities';
      state.topTab = 'database';
      state.tab = tabKey;
      state.page = 1;
      state.selectedIds.clear();
      if (state.filters[tabKey]) state.filters[tabKey].id = String(id);
      urlState.push('push');
      applyNav();
    };

    // -----------------------------------------------------------------------
    // Per-field correction helpers (migration 038 / staging_field_corrections)
    // -----------------------------------------------------------------------

    const _entitySuggestionTimers = new Map();

    window.loadEntitySuggestions = function(input, datalistId) {
      const q = input.value;
      const prev = _entitySuggestionTimers.get(datalistId);
      if (prev) clearTimeout(prev);
      _entitySuggestionTimers.set(datalistId, setTimeout(async () => {
        try {
          const res = await fetch(`/api/admin/autocomplete/biota?q=${encodeURIComponent(q)}`);
          const data = await res.json();
          const dl = document.getElementById(datalistId);
          if (!dl) return;
          const items = (data.items || []).slice(0, 25);
          dl.innerHTML = items.map(it => `<option value="${esc(it.scientific_name || it.name || String(it))}"></option>`).join('');
        } catch { /* silent */ }
      }, 200));
    };

    window.commitFieldEdit = async function(input) {
      const stagingId = parseInt(input.dataset.stagingId, 10);
      const fieldPath = input.dataset.fieldPath;
      const newValue = input.value;
      // Recover original value from data-staging-row on the parent table row
      const tr = document.querySelector(`#rows tr[data-id="${stagingId}"]`);
      if (!tr) return;
      let payloadObj = {};
      try {
        const raw = decodeURIComponent(escape(atob(tr.dataset.stagingRow)));
        const rowData = JSON.parse(raw);
        payloadObj = typeof rowData.payload === 'string' ? JSON.parse(rowData.payload) : (rowData.payload || {});
      } catch { /* parse failed — compare will differ, which is fine */ }
      const original = String(payloadObj[fieldPath] ?? '');
      if (newValue === original) return;
      await postFieldCorrection(stagingId, fieldPath, 'edited', newValue);
    };

    window.markFieldCorrect = async function(stagingId, fieldPath) {
      await postFieldCorrection(stagingId, fieldPath, 'correct');
    };

    window.markFieldRejected = function(stagingId, fieldPath) {
      // Swap action buttons for an inline note input instead of immediately POSTing.
      // Partner can type a reason (Enter to submit) or hit × to cancel.
      const escaped = cssEscapeAttr(fieldPath);
      const trs = document.querySelectorAll(`tr[data-field-path="${escaped}"]`);
      if (!trs.length) return;
      trs.forEach(tr => {
        const actionCell = tr.querySelector('td:last-child');
        if (!actionCell) return;
        const noteId = `reject-note-${stagingId}-${escaped}`;
        actionCell.innerHTML =
          `<input type="text" id="${noteId}"` +
          ` placeholder="Optional: why wrong? (Enter to skip)"` +
          ` style="padding:3px 6px;border:1px solid #c0392b;border-radius:3px;font-size:11px;width:190px;vertical-align:middle"` +
          ` onkeydown="handleRejectNoteKey(event,${stagingId},'${esc(fieldPath)}')" />` +
          ` <button onclick="submitRejectNote(${stagingId},'${esc(fieldPath)}')"` +
          `  style="margin-left:4px;padding:2px 8px;background:#c0392b;color:white;border:none;border-radius:3px;cursor:pointer;font-size:11px;vertical-align:middle">Save</button>` +
          ` <button onclick="cancelRejectNote(${stagingId},'${esc(fieldPath)}')"` +
          `  style="margin-left:2px;padding:2px 6px;background:transparent;border:1px solid #aaa;color:#aaa;border-radius:3px;cursor:pointer;font-size:11px;vertical-align:middle">×</button>`;
      });
      // Focus the first input rendered
      const input = document.getElementById(`reject-note-${stagingId}-${escaped}`);
      if (input) input.focus();
    };

    window.handleRejectNoteKey = function(event, stagingId, fieldPath) {
      if (event.key === 'Enter') { event.preventDefault(); submitRejectNote(stagingId, fieldPath); }
      else if (event.key === 'Escape') { event.preventDefault(); cancelRejectNote(stagingId, fieldPath); }
    };

    window.submitRejectNote = async function(stagingId, fieldPath) {
      const escaped = cssEscapeAttr(fieldPath);
      const input = document.getElementById(`reject-note-${stagingId}-${escaped}`);
      const note = input ? input.value.trim() : '';
      // Backend applies default "correct answer unknown / not stated in source" when note is empty.
      await postFieldCorrection(stagingId, fieldPath, 'rejected', undefined, note || null);
      _restoreActionCell(stagingId, fieldPath);
    };

    window.cancelRejectNote = function(stagingId, fieldPath) {
      _restoreActionCell(stagingId, fieldPath);
    };

    function _restoreActionCell(stagingId, fieldPath) {
      const escaped = cssEscapeAttr(fieldPath);
      const trs = document.querySelectorAll(`tr[data-field-path="${escaped}"]`);
      trs.forEach(tr => {
        const actionCell = tr.querySelector('td:last-child');
        if (!actionCell) return;
        actionCell.innerHTML =
          `<span class="field-correction-pill" data-field-path="${esc(fieldPath)}"` +
          ` style="display:none;font-size:10px;padding:2px 6px;border-radius:3px;margin-right:4px;vertical-align:middle"></span>` +
          `<button onclick="markFieldCorrect(${stagingId},'${esc(fieldPath)}')" title="Field is correct as-is"` +
          ` style="padding:2px 7px;background:transparent;border:1px solid var(--nature-700,#2f6a31);color:var(--nature-700,#2f6a31);border-radius:3px;cursor:pointer;font-size:11px">&#10003;</button>` +
          `<button onclick="markFieldRejected(${stagingId},'${esc(fieldPath)}')" title="Field value is wrong"` +
          ` style="margin-left:3px;padding:2px 7px;background:transparent;border:1px solid #c0392b;color:#c0392b;border-radius:3px;cursor:pointer;font-size:11px">&#10005;</button>`;
      });
      // Re-stamp any existing correction pill
      loadAndApplyCorrections(stagingId);
    }

    async function postFieldCorrection(stagingId, fieldPath, action, correctedValue, note) {
      try {
        const body = { field_path: fieldPath, action };
        if (correctedValue !== undefined) body.corrected_value = correctedValue;
        if (note !== undefined && note !== null) body.note = note;
        const res = await fetch(`/api/admin/staging/${stagingId}/correct`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) { console.error('postFieldCorrection failed', data); return; }
        // Stamp the pill in the expand panel
        stampFieldPill(stagingId, fieldPath, action);
        // If auto-promoted, show banner and refresh the staging table
        if (data.auto_status) {
          const banner = document.getElementById(`auto-promote-banner-${stagingId}`);
          if (banner) {
            const label = data.auto_status === 'approved' ? 'Auto-approved (all fields verified)' : 'Auto-rejected (field flagged as wrong)';
            const color = data.auto_status === 'approved' ? 'rgba(47,106,49,0.12)' : 'rgba(192,57,43,0.10)';
            const textColor = data.auto_status === 'approved' ? 'var(--nature-700,#2f6a31)' : '#c0392b';
            banner.style.display = 'inline-block';
            banner.style.background = color;
            banner.style.color = textColor;
            banner.textContent = label;
          }
          if (data.auto_status === 'approved') {
            const acceptBtn = document.getElementById(`accept-btn-${stagingId}`);
            if (acceptBtn) { acceptBtn.style.opacity = '0.45'; acceptBtn.disabled = true; }
          }
          if (typeof markSourceDirty === 'function') await markSourceDirty();
          if (typeof load === 'function') load();
          // Auto-close any open lightbox so the partner returns to the refreshed table
          document.querySelectorAll('.pdf-overlay').forEach(o => o.remove());
        }
      } catch (err) {
        console.error('postFieldCorrection threw', err);
      }
    }

    function stampFieldPill(stagingId, fieldPath, action) {
      // Match pills in both the expand-panel (tr.staging-expanded) AND the
      // lightbox sidebar (.pdf-overlay), so a click in either context updates both.
      const styles = {
        correct:  { bg: 'rgba(47,106,49,0.15)', color: 'var(--nature-700,#2f6a31)', text: '✓ correct' },
        edited:   { bg: 'rgba(47,106,49,0.10)', color: 'var(--nature-700,#2f6a31)', text: '✎ edited' },
        rejected: { bg: 'rgba(192,57,43,0.15)', color: '#c0392b',                   text: '✕ wrong' }
      };
      const st = styles[action];
      if (!st) return;
      const escaped = cssEscapeAttr(fieldPath);
      const pills = document.querySelectorAll(`tr[data-field-path="${escaped}"] .field-correction-pill`);
      pills.forEach(pill => {
        pill.style.display = 'inline-block';
        pill.style.background = st.bg;
        pill.style.color = st.color;
        pill.textContent = st.text;
      });
    }

    async function loadAndApplyCorrections(stagingId) {
      try {
        const res = await fetch(`/api/admin/staging/${stagingId}/corrections`);
        const data = await res.json();
        if (!data.corrections) return;
        for (const c of data.corrections) stampFieldPill(stagingId, c.field_path, c.action);
      } catch { /* silent */ }
    }

    function cssEscapeAttr(s) {
      // Escape a string for use in a CSS attribute selector value.
      // field_path values are plain ASCII keys so this is mostly defensive.
      return String(s).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    }

    function renderFilterBar() {
      const tab = tabs[state.tab];
      $('filter-bar').innerHTML = tab.renderFilters(state.filters[state.tab], state.lastResponse[state.tab]);
      // Wire up change handlers
      $('filter-bar').querySelectorAll('select, input').forEach(el => {
        el.addEventListener('change', () => {
          state.filters[state.tab][el.name] = el.value;
          state.page = 1;
          urlState.push('replace');
          load();
        });
        if (el.tagName === 'INPUT') {
          let timer = null;
          el.addEventListener('input', () => {
            clearTimeout(timer);
            timer = setTimeout(() => {
              state.filters[state.tab][el.name] = el.value;
              state.page = 1;
              urlState.push('replace');
              load();
            }, 350);
          });
        }
      });
    }

    function renderHeader() {
      const tab = tabs[state.tab];
      // Column header strings can contain HTML (e.g. the select-all checkbox
      // on the Claims tab). They're hardcoded in our tab configs — no user
      // input — so we render them raw. Plain-text headers still work
      // because they have no HTML characters that need escaping.
      $('thead-row').innerHTML = tab.columns.map((c, idx) => {
        const isCheckbox = typeof c === 'string' && c.startsWith('<input');
        const infoKey = (COLUMN_INFO_MAP[state.tab] || [])[idx];
        const infoBubble = infoKey ? infoIcon(infoKey) : '';
        return `<th${isCheckbox ? ' class="checkbox"' : ''}>${c}${infoBubble}</th>`;
      }).join('');
    }

    async function load() {
      const myLoadId = ++activeLoadId;
      const tab = tabs[state.tab];
      // Custom-render tabs (Upload, etc.) skip the standard data fetch.
      if (tab.custom) {
        renderCustomTab(state.tab);
        return;
      }
      // When in the Ingest top-tab, scope sub-tab data to the selected
      // source. If no source is picked, show an empty-state prompt
      // instead of fetching across all sources (which would lose the
      // partner's mental model of "this is what just got ingested").
      const isIngest = state.topTab === 'ingest';
      const noSourceScope = !!tab.noSourceScope;
      if (isIngest && state.tab !== 'upload' && !noSourceScope && !state.ingestSourceId) {
        $('status-meta').textContent = '— pick a source above to load Ingest data —';
        $('rows').innerHTML = `<tr><td colspan="20" class="empty">Select a paper from the Queue tab to scope the Ingest tabs to it.</td></tr>`;
        $('pager').innerHTML = '';
        return;
      }
      // Show loading placeholder immediately so stale rows from a previous tab are never visible.
      const colCount = (tab.columns || []).length || 20;
      const tbodyEarly = $('rows');
      if (tbodyEarly) tbodyEarly.innerHTML = `<tr><td colspan="${colCount}" class="empty" style="opacity:0.6">Loading…</td></tr>`;
      try {
        const filterParams = { ...state.filters[state.tab] };
        if (isIngest && state.ingestSourceId && !noSourceScope) {
          filterParams.source_id = state.ingestSourceId;
        }
        const params = new URLSearchParams({ page: state.page, pageSize: state.pageSize, ...filterParams });
        const res = await fetch(`${tab.endpoint}?${params}`);
        const rawData = await res.json();
        // Out-of-order fetch: a newer load() has already started — discard this result.
        if (myLoadId !== activeLoadId) return;
        // Normalise flat-array responses (e.g. ingest-sources returns { items } without pagination).
        const data = (rawData.total === undefined && Array.isArray(rawData.items))
          ? { items: rawData.items, total: rawData.items.length, page: 1, pageSize: rawData.items.length || 1 }
          : rawData;
        // Defensive: malformed or error responses must not throw — render empty table instead.
        if (!Array.isArray(data.items)) data.items = [];
        state.lastResponse[state.tab] = data;
        renderFilterBar();
        $('status-meta').textContent = `${(data.total ?? 0).toLocaleString()} ${state.tab} · page ${data.page} of ${Math.max(1, Math.ceil((data.total || 0) / (data.pageSize || 50)))}`;
        const tbody = $('rows');
        if (data.items.length) {
          tbody.innerHTML = data.items.map(tab.renderRow).join('');
        } else {
          tbody.innerHTML = `<tr><td colspan="${colCount}" class="empty">No rows match the current filters.</td></tr>`;
        }
        const totalPages = Math.max(1, Math.ceil(data.total / data.pageSize));
        $('pager').innerHTML = noSourceScope ? '' : `
          <button ${data.page === 1 ? 'disabled' : ''} onclick="goPage(1)">⏮ First</button>
          <button ${data.page === 1 ? 'disabled' : ''} onclick="goPage(${data.page - 1})">← Prev</button>
          <span class="pager-info">Page ${data.page} of ${totalPages}</span>
          <button ${data.page === totalPages ? 'disabled' : ''} onclick="goPage(${data.page + 1})">Next →</button>
          <button ${data.page === totalPages ? 'disabled' : ''} onclick="goPage(${totalPages})">Last ⏭</button>
        `;
        window.scrollTo({ top: 0, behavior: 'instant' });
      } catch (err) {
        if (myLoadId !== activeLoadId) return;
        console.error('load() failed', err);
        const tbody = $('rows');
        if (tbody) tbody.innerHTML = `<tr><td colspan="${colCount}" class="empty" style="color:var(--red,#c0392b)">Error loading data: ${(err && err.message) ? esc(err.message) : 'unknown error'}. Try a different filter or reload.</td></tr>`;
      }
    }

        selectedFile = f || null;
        if (f) {
          dropzoneMsg.textContent = `📄 ${f.name} (${(f.size / 1024 / 1024).toFixed(1)} MB) — ready to upload`;
          dropzone.style.borderColor = 'var(--nature-700)';
          submitBtn.disabled = false;
        } else {
          dropzoneMsg.textContent = 'Drag & drop a PDF here, or click to browse';
          dropzone.style.borderColor = 'rgba(47,106,49,0.4)';
          submitBtn.disabled = true;
        }
      }

      dropzone.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', e => setSelected(e.target.files[0]));
      dropzone.addEventListener('dragover', e => {
        e.preventDefault();
        dropzone.style.borderColor = 'var(--nature-700)';
      });
      dropzone.addEventListener('dragleave', () => {
        dropzone.style.borderColor = selectedFile ? 'var(--nature-700)' : 'rgba(47,106,49,0.4)';
      });
      dropzone.addEventListener('drop', e => {
        e.preventDefault();
        const f = e.dataTransfer.files?.[0];
        if (f) setSelected(f);
      });

      form.addEventListener('submit', async e => {
        e.preventDefault();
        if (!selectedFile) return;
        const fd = new FormData();
        fd.append('file', selectedFile);
        fd.append('source_type', document.getElementById('upload-source-type').value);
        const title = document.getElementById('upload-title').value.trim();
        if (title) fd.append('title', title);
        fd.append('uploader', $('reviewer').value.trim() || 'owner');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Uploading…';
        resultDiv.innerHTML = '';
        try {
          const res = await fetch('/api/admin/review/upload', { method: 'POST', body: fd });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${res.status}`);
          }
          const data = await res.json();
          toast(`Uploaded — queue #${data.queue_id}, source #${data.source_id}`);
          resultDiv.innerHTML = `
            <div style="background:#e6f6e7;border:1px solid var(--nature-200);border-radius:6px;padding:12px 16px;font-size:12px">
              <strong style="color:var(--nature-900)">✓ Upload complete</strong><br/>
              <span style="color:var(--earth-700)">
                Queue id: <strong>${data.queue_id}</strong> · Source id: <strong>${data.source_id}</strong> · File: <code>${esc(data.sanitized_name)}</code><br/>
                The owner runs <code>backend/pdf-chunk.js</code> + <code>backend/stage-from-json.js</code> to extract.
                Once extraction completes, the source will appear in the Ingest source-picker.
              </span>
            </div>
          `;
          // Clear the form for the next upload.
          fileInput.value = '';
          document.getElementById('upload-title').value = '';
          setSelected(null);
          submitBtn.textContent = 'Upload';
          // Invalidate the cached source list so the next Ingest entry refetches.
          ingestSourcesList = [];
        } catch (err) {
          toast(`Upload failed: ${err.message}`, true);
          resultDiv.innerHTML = `
            <div style="background:#fadddd;border:1px solid #f7c7c7;border-radius:6px;padding:12px 16px;font-size:12px;color:var(--red)">
              Upload failed: ${esc(err.message)}
            </div>
          `;
          submitBtn.disabled = false;
          submitBtn.textContent = 'Upload';
        }
      });
    }

    // ── External exports (Publish > GloBI / Trefle) ──────────────────────────
    function exportGlobiCsv() {
      // Trigger a browser download via a hidden anchor — the response is
      // streamed as text/csv with Content-Disposition: attachment, so
      // the browser handles the save dialog.
      const url = '/api/admin/review/export/globi.csv?status=human_verified';
      const a = document.createElement('a');
      a.href = url; a.download = '';
      document.body.appendChild(a); a.click(); a.remove();
      toast('GloBI CSV download initiated (human_verified claims only)');
    }
    function exportTrefleJson() {
      const url = '/api/admin/review/export/trefle.json';
      const a = document.createElement('a');
      a.href = url; a.download = '';
      document.body.appendChild(a); a.click(); a.remove();
      toast('Trefle JSON download initiated (CC-licensed plant entities only)');
    }

    async function setTopTab(key) {
      if (!tabGroups[key]) return;
      if (typeof autoAdvance !== 'undefined') autoAdvance.dismiss();
      state.topTab = key;
      // Pick the first sub-tab in this group as the active sub-tab.
      const firstSub = tabGroups[key].subs[0];
      state.tab = firstSub;
      state.page = 1;
      state.selectedIds.clear();
      updateBulkBar();
      clearStagingSelection();
      urlState.push('push');
      renderTopTabs();
      // Load the ingest source list lazily on first entry into Ingest.
      if (key === 'ingest') await loadIngestSources();
      renderIngestPicker();
      renderTabs();
      renderFilterBar();
      renderHeader();
      load();
    }

    function setTab(key) {
      if (typeof autoAdvance !== 'undefined') autoAdvance.dismiss();
      state.tab = key;
      state.page = 1;
      state.selectedIds.clear();
      updateBulkBar();
      clearStagingSelection();
      urlState.push('push');
      applyNav();
    }

    function goPage(n) {
      state.page = n;
      state.selectedIds.clear();
      updateBulkBar();
      clearStagingSelection();
      urlState.push('replace');
      load();
    }

    function toggleExpand(id) {
      const row = document.querySelector(`tr.claim-row[data-id="${id}"]`);
      if (!row) return;
      row.classList.toggle('expanded');
    }

    // Staging-row equivalent of action(). The Verify expand panel calls this
    // because its row ids are extraction_staging.id, not claims.id — calling
    // /api/admin/review/:id/* (which looks up claims) would 404.
    async function actionStaging(stagingId, kind, btn, note) {
      const endpointMap = { accept: 'approve', reject: 'reject', flag: 'flag' };
      const endpoint = endpointMap[kind];
      if (!endpoint) { toast(`Unknown action: ${kind}`, true); return; }
      const reviewer = $('reviewer').value.trim() || null;
      if (btn) btn.disabled = true;
      try {
        const body = { reviewer };
        if (note !== undefined && note !== null && note !== '') body.note = note;
        const res = await fetch(`/api/admin/staging/${stagingId}/${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        toast(`Staging #${stagingId}: ${kind} → ${data.review_status}`);
        document.querySelectorAll('.pdf-overlay').forEach(o => o.remove());
        await markSourceDirty();
        await load();
      } catch (err) {
        toast(`Error: ${err.message}`, true);
        if (btn) btn.disabled = false;
      }
    }

    // Row-level Reject / Flag prompt: swap the action bar for an inline note
    // input (mirrors the per-field ✕ Reject UX). Empty input → no note (the
    // backend stores null in review_note). Esc cancels and restores the bar.
    const _stagingActionBarHTML = {};  // stagingId → original innerHTML for restore
    window.actionStagingPrompt = function(stagingId, kind, btn) {
      if (kind === 'accept') { actionStaging(stagingId, 'accept', btn); return; }
      const bar = document.getElementById(`actions-bar-${stagingId}`);
      if (!bar) { actionStaging(stagingId, kind, btn); return; } // fallback
      _stagingActionBarHTML[stagingId] = bar.innerHTML;
      const isReject = kind === 'reject';
      const color = isReject ? '#c0392b' : '#e6b800';
      const fg    = isReject ? 'white'   : '#333';
      const verb  = isReject ? 'Reject'  : 'Flag';
      const placeholder = isReject
        ? 'Optional: why is the whole row wrong? (Enter to skip)'
        : 'Optional: what needs a second look? (Enter to skip)';
      bar.innerHTML = `
        <input type="text" id="row-note-${stagingId}"
               placeholder="${placeholder}"
               style="padding:6px 10px;border:1px solid ${color};border-radius:4px;font-size:12px;flex:1;min-width:300px"
               onkeydown="handleRowNoteKey(event, ${stagingId}, '${kind}')" />
        <button onclick="submitRowNote(${stagingId}, '${kind}', this)"
                style="padding:6px 14px;background:${color};color:${fg};border:none;border-radius:4px;cursor:pointer">${verb}</button>
        <button onclick="cancelRowNote(${stagingId})"
                style="padding:6px 12px;background:transparent;border:1px solid #999;color:#666;border-radius:4px;cursor:pointer">Cancel</button>
      `;
      const input = document.getElementById(`row-note-${stagingId}`);
      if (input) input.focus();
    };

    window.handleRowNoteKey = function(event, stagingId, kind) {
      if (event.key === 'Enter') { event.preventDefault(); submitRowNote(stagingId, kind, event.target); }
      else if (event.key === 'Escape') { event.preventDefault(); cancelRowNote(stagingId); }
    };

    window.submitRowNote = function(stagingId, kind, btn) {
      const input = document.getElementById(`row-note-${stagingId}`);
      const note = input ? input.value.trim() : '';
      actionStaging(stagingId, kind, btn, note || null);
    };

    window.cancelRowNote = function(stagingId) {
      const bar = document.getElementById(`actions-bar-${stagingId}`);
      const html = _stagingActionBarHTML[stagingId];
      if (bar && html) bar.innerHTML = html;
      delete _stagingActionBarHTML[stagingId];
    };

    async function action(id, kind, btn) {
      const reviewer = $('reviewer').value.trim() || null;
      btn.disabled = true;
      try {
        const res = await fetch(`/api/admin/review/${id}/${kind}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reviewer })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        toast(`#${id}: ${kind} → ${data.review_status}`);
        // Auto-close any open lightbox so the partner returns to the refreshed table
        document.querySelectorAll('.pdf-overlay').forEach(o => o.remove());
        if (state.filters.claims.status === 'ai_reviewed') {
          const row = btn.closest('tr.claim-row');
          if (row) {
            row.style.opacity = 0.3;
            setTimeout(() => row.remove(), 250);
          }
        } else {
          load();
        }
        await markSourceDirty();
      } catch (err) {
        toast(`Error: ${err.message}`, true);
        btn.disabled = false;
      }
    }

    $('page-size').addEventListener('change', e => {
      state.pageSize = parseInt(e.target.value, 10);
      state.page = 1;
      urlState.push('replace');
      load();
    });
    $('reviewer').addEventListener('input', e => {
      localStorage.setItem('agroeco-reviewer', e.target.value);
    });
    $('reviewer').value = localStorage.getItem('agroeco-reviewer') || '';

    // Load region list FIRST (so filter dropdowns are populated), then render.
    async function init() {
      try {
        const res = await fetch('/api/admin/review/regions');
        const d = await res.json();
        regionsList = d.items || [];
      } catch (err) {
        console.warn('Failed to load region list:', err);
      }
      const hadHash = urlState.hydrate();
      if (!hadHash) {
        state.topTab = 'ingest';
        state.tab = 'upload';
      }
      renderTopTabs();
      renderIngestPicker();
      if (state.ingestSourceId) {
        await progressStrip.fetch();
        progressStrip.render();
      }
      renderTabs();
      renderFilterBar();
      renderHeader();
      load();
    }
    // ── Keyboard shortcut layer (Task 12) ────────────────────────────────────
    const BINDINGS = [
      { group: 'Navigation',
        items: [
          { key: 'j',   desc: 'Focus next row',          fn: () => focusRow(+1) },
          { key: 'k',   desc: 'Focus previous row',      fn: () => focusRow(-1) },
          { key: 'g g', desc: 'Focus first row on page', fn: () => focusRowAt(0) },
          { key: 'G',   desc: 'Focus last row on page',  fn: () => focusRowAt(-1) },
          { key: ']',   desc: 'Next page',               fn: () => paginate(+1) },
          { key: '[',   desc: 'Previous page',           fn: () => paginate(-1) },
          { key: 'Esc', desc: 'Clear focus / close overlay', fn: () => clearFocus() }
        ]},
      { group: 'Actions (focused row required)',
        items: [
          { key: '⇧A',   desc: 'Accept focused row',              fn: () => actFocused('accept') },
          { key: '⇧R',   desc: 'Reject focused row',              fn: () => actFocused('reject') },
          { key: '⇧F',   desc: 'Flag focused row',                fn: () => actFocused('flag') },
          { key: 'e',    desc: 'Inline-edit first editable cell', fn: () => editFocused() },
          { key: 'x',    desc: 'Toggle row checkbox',             fn: () => toggleFocusedCheckbox() },
          { key: 'Enter',desc: 'Expand source-quote / open detail', fn: () => expandFocused() }
        ]},
      { group: 'Jumps',
        items: [
          { key: 'g i', desc: 'Ingest top-tab',    fn: () => jumpTopTab('ingest') },
          { key: 'g d', desc: 'Database top-tab',  fn: () => jumpTopTab('database') },
          { key: 'g p', desc: 'Publish top-tab',   fn: () => jumpTopTab('publish') },
          { key: 'g u', desc: 'Ingest > Upload',   fn: () => jumpSubTab('upload', 'ingest') },
          { key: 'g q', desc: 'Ingest > Queue',    fn: () => jumpSubTab('queue', 'ingest') },
          { key: 'g s', desc: 'Ingest > Staging',  fn: () => jumpSubTab('staging', 'ingest') },
          { key: 'g e', desc: 'Ingest > Entities', fn: () => jumpSubTab('entities', 'ingest') },
          { key: 'g c', desc: 'Ingest > Claims',   fn: () => jumpSubTab('claims', 'ingest') }
        ]},
      { group: 'Other',
        items: [
          { key: '*', desc: 'Select all on page',    fn: () => toggleSelectAllOnPage() },
          { key: '/', desc: 'Focus filter-bar input', fn: () => focusFilterBar() },
          { key: '?', desc: 'Show this cheat-sheet', fn: () => cheatsheet.toggle() }
        ]}
    ];

    const hotkeys = {
      pendingPrefix: null,
      prefixTimer: null,
      install() { document.addEventListener('keydown', e => this.handle(e)); },
      shouldIgnore(e) {
        const t = e.target;
        return t && t.matches && t.matches('input, textarea, select, [contenteditable="true"]');
      },
      handle(e) {
        if (this.shouldIgnore(e)) return;
        if (e.metaKey || e.ctrlKey || e.altKey) return;

        // Two-key sequences: 'g' prefix
        if (this.pendingPrefix === 'g') {
          this.pendingPrefix = null;
          clearTimeout(this.prefixTimer);
          const second = e.key;
          const combo = `g ${second}`;
          const binding = this.find(combo);
          if (binding) { e.preventDefault(); binding.fn(); return; }
          e.preventDefault();
          return;
        }
        if (e.key === 'g' && !e.shiftKey) {
          this.pendingPrefix = 'g';
          this.prefixTimer = setTimeout(() => { this.pendingPrefix = null; }, 700);
          e.preventDefault();
          return;
        }

        // Build key string for lookup
        let lookup;
        if (e.shiftKey && /^[a-z]$/i.test(e.key)) {
          const upper = e.key.toUpperCase();
          if (upper === 'G') lookup = 'G';
          else               lookup = '⇧' + upper;
        } else {
          lookup = e.key;
        }

        // Map browser names
        if (lookup === 'Escape') lookup = 'Esc';

        const binding = this.find(lookup);
        if (binding) { e.preventDefault(); binding.fn(); }
      },
      find(keyString) {
        for (const grp of BINDINGS) {
          for (const it of grp.items) {
            if (it.key === keyString) return it;
          }
        }
        return null;
      }
    };

    // Focus model
    function focusedRow() {
      if (!state.focusedRowId) return null;
      return document.querySelector(`#rows tr[data-id="${state.focusedRowId}"]`)
          || document.querySelector(`#rows tr[data-claim-id="${state.focusedRowId}"]`);
    }
    function rowsOnPage() {
      return Array.from(
        document.querySelectorAll('#rows tr[data-id], #rows tr[data-claim-id]')
      );
    }
    function rowIdOf(tr) {
      const v = tr.dataset.id || tr.dataset.claimId;
      const n = parseInt(v, 10);
      return Number.isFinite(n) ? n : null;
    }
    function focusRow(delta) {
      const rows = rowsOnPage();
      if (!rows.length) return;
      const idx = rows.findIndex(r => rowIdOf(r) === state.focusedRowId);
      const nextIdx = idx === -1 ? 0 : Math.max(0, Math.min(rows.length - 1, idx + delta));
      setFocusedRow(rows[nextIdx]);
    }
    function focusRowAt(i) {
      const rows = rowsOnPage();
      if (!rows.length) return;
      setFocusedRow(rows[i < 0 ? rows.length + i : i]);
    }
    function setFocusedRow(tr) {
      document.querySelectorAll('tr.row-focused').forEach(r => r.classList.remove('row-focused'));
      if (!tr) { state.focusedRowId = null; return; }
      tr.classList.add('row-focused');
      state.focusedRowId = rowIdOf(tr);
      tr.scrollIntoView({ block: 'nearest' });
    }
    function clearFocus() {
      setFocusedRow(null);
      cheatsheet.toggle(false);
    }

    // Action helpers — only fire when a row is focused
    function actFocused(action) {
      const tr = focusedRow(); if (!tr) return;
      const id = rowIdOf(tr);
      if (!id) return;
      const allowed = { staging: ['accept','reject','flag'], claims: ['accept','reject','flag'],
                        published: ['accept','reject','flag'] };
      if (!allowed[state.tab] || !allowed[state.tab].includes(action)) return;

      let url, method, body;
      if (state.tab === 'staging') {
        if (action === 'flag') {
          url = '/api/admin/staging/bulk'; method = 'POST'; body = JSON.stringify({ ids: [id], action });
        } else {
          url = `/api/admin/staging/${id}/${action}`; method = 'POST'; body = null;
        }
      } else {
        url = `/api/admin/review/${id}/${action}`; method = 'POST'; body = null;
      }

      fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body })
        .then(r => {
          if (!r.ok) { console.warn(`hotkey ${action} on ${id} failed`, r.status); return null; }
          if (typeof load === 'function') return load();
        })
        .then(() => focusRow(+1))
        .then(() => { if (typeof markSourceDirty === 'function') return markSourceDirty(); });
    }
    function editFocused() {
      const tr = focusedRow(); if (!tr) return;
      const cell = tr.querySelector('td.editable');
      if (cell) cell.click();
    }
    function toggleFocusedCheckbox() {
      const tr = focusedRow(); if (!tr) return;
      const cb = tr.querySelector('input.row-select, input.row-select-staging, input.row-select-claims, input[data-claim-id]');
      if (cb) { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); }
    }
    function expandFocused() {
      const tr = focusedRow(); if (!tr) return;
      const quote = tr.querySelector('.quote, .source-quote, td.expandable');
      if (quote && quote.click) quote.click();
    }

    // Navigation helpers
    function paginate(delta) {
      const next = (state.page || 1) + delta;
      if (next < 1) return;
      state.page = next;
      if (typeof urlState !== 'undefined') urlState.push('replace');
      if (typeof load === 'function') load();
    }
    function jumpTopTab(key) {
      if (typeof setTopTab === 'function') setTopTab(key);
    }
    function jumpSubTab(subKey, requiredTopTab) {
      if (requiredTopTab && state.topTab !== requiredTopTab) {
        if (typeof setTopTab === 'function') setTopTab(requiredTopTab);
      }
      if (typeof setTab === 'function') {
        setTab(subKey);
      } else {
        state.tab = subKey;
        if (typeof urlState !== 'undefined') urlState.push('push');
        if (typeof renderTabs === 'function') renderTabs();
        if (typeof load === 'function') load();
      }
    }
    function toggleSelectAllOnPage() {
      const sa = document.getElementById('select-all-staging') || document.getElementById('select-all');
      if (sa) { sa.checked = !sa.checked; sa.dispatchEvent(new Event('change')); }
    }
    function focusFilterBar() {
      const inp = document.querySelector('.filter-bar input, .filter-bar select');
      if (inp) inp.focus();
    }

    // Cheat-sheet overlay
    const cheatsheet = {
      el: null,
      isOpen() { return !!this.el && this.el.classList.contains('visible'); },
      toggle(force) {
        if (!this.el) this.render();
        const wantOpen = (force === undefined) ? !this.isOpen() : force;
        this.el.classList.toggle('visible', wantOpen);
      },
      render() {
        const groups = BINDINGS.map(g =>
          `<h3>${g.group}</h3><table>${
            g.items.map(it => `<tr><td class="binding"><kbd>${it.key}</kbd></td><td>${it.desc}</td></tr>`).join('')
          }</table>`).join('');
        this.el = document.createElement('div');
        this.el.className = 'cheatsheet-backdrop';
        this.el.innerHTML = `<div class="cheatsheet">
          <h2>Keyboard shortcuts</h2>${groups}
          <p style="margin-top:16px;color:var(--earth-700)">Press <kbd>Esc</kbd> or click outside to close.</p>
        </div>`;
        this.el.addEventListener('click', e => { if (e.target === this.el) this.toggle(false); });
        document.body.appendChild(this.el);
      }
    };

    // Initialize focusedRowId on state if not present
    state.focusedRowId = state.focusedRowId || null;

    // Install global keydown listener
    hotkeys.install();
    // ── End keyboard shortcut layer ───────────────────────────────────────────

    init();
  </script>
</body>
</html>
