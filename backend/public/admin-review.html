<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AgroEco — admin review</title>
  <style>
    :root {
      --nature-50: #f4faf3;
      --nature-100: #eaf3e8;
      --nature-200: #cfe6ce;
      --nature-700: #2f6a31;
      --nature-900: #173d1a;
      --earth-50: #faf6ee;
      --earth-700: #6b4f2a;
      --red: #c0392b;
      --yellow: #b78103;
      --row-alt: #f9fbf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--nature-50);
      color: #1a1a1a;
      font-size: 13px;
      line-height: 1.4;
    }
    header {
      background: white;
      border-bottom: 1px solid rgba(47, 106, 49, 0.2);
      padding: 12px 20px 0 20px;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .header-row1 { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    header h1 { margin: 0; font-size: 16px; color: var(--nature-900); }
    header .meta { font-size: 12px; color: var(--earth-700); }
    header label { font-size: 12px; color: var(--earth-700); display: inline-flex; align-items: center; gap: 4px; }
    header input[type=text], header select {
      padding: 4px 8px;
      border: 1px solid rgba(47, 106, 49, 0.3);
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
    }
    header input[type=text] { width: 220px; }

    /* Top-level workflow tabs (Ingest / Database / Publish) */
    .top-tabs {
      display: flex;
      gap: 0;
      margin-top: 10px;
      border-bottom: 2px solid rgba(47, 106, 49, 0.18);
    }
    .top-tab-btn {
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 10px 22px;
      font-size: 14px;
      color: var(--earth-700);
      font-family: inherit;
      font-weight: 500;
      letter-spacing: 0.02em;
      position: relative;
      bottom: -2px;
    }
    .top-tab-btn:hover { color: var(--nature-900); }
    .top-tab-btn.active {
      color: var(--nature-900);
      font-weight: 700;
      border-bottom: 3px solid var(--nature-700);
    }
    .top-tab-desc {
      font-size: 11px;
      color: var(--earth-700);
      padding: 6px 4px 0 4px;
      font-style: italic;
    }

    /* Ingest source picker — visible only when top-tab is 'ingest' */
    .ingest-picker {
      margin: 8px 0 4px 0;
      padding: 10px 12px;
      background: var(--nature-100);
      border: 1px solid var(--nature-200);
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 12px;
    }
    .ingest-picker.hidden { display: none; }
    .ingest-picker label { color: var(--nature-900); font-weight: 600; }
    .ingest-picker select {
      padding: 5px 10px;
      border: 1px solid rgba(47, 106, 49, 0.35);
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      background: white;
      min-width: 320px;
      max-width: 100%;
    }
    .ingest-picker .source-meta {
      color: var(--earth-700);
      font-size: 11px;
      font-style: italic;
    }
    .ingest-picker .source-meta strong { color: var(--nature-900); font-style: normal; }
    .ingest-picker .clear-source {
      cursor: pointer;
      background: white;
      border: 1px solid rgba(47, 106, 49, 0.2);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--earth-700);
    }
    .ingest-picker .clear-source:hover { border-color: var(--nature-700); color: var(--nature-900); }

    /* Sub-tabs within each top-level group */
    .tabs {
      display: flex;
      gap: 2px;
      margin-top: 8px;
      padding-top: 4px;
    }
    .tab-btn {
      cursor: pointer;
      background: transparent;
      border: 1px solid transparent;
      border-bottom: none;
      border-top-left-radius: 6px;
      border-top-right-radius: 6px;
      padding: 7px 14px;
      font-size: 13px;
      color: var(--earth-700);
      font-family: inherit;
      font-weight: 500;
      position: relative;
      bottom: -1px;
    }
    .tab-btn:hover { color: var(--nature-900); }
    .tab-btn.active {
      background: var(--nature-50);
      color: var(--nature-900);
      border-color: rgba(47, 106, 49, 0.25);
      border-bottom: 1px solid var(--nature-50);
      font-weight: 600;
    }
    .tab-count {
      display: inline-block;
      margin-left: 6px;
      padding: 0 7px;
      background: rgba(47, 106, 49, 0.12);
      border-radius: 9px;
      font-size: 11px;
      color: var(--nature-900);
    }
    .tab-btn.active .tab-count { background: var(--nature-200); }

    /* Chip-filter row (Staging verdict chips, reused in Task 10) */
    .chip-row {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin: 6px 16px 0;
    }
    .chip {
      cursor: pointer;
      border-radius: 12px;
      padding: 4px 10px;
      font-size: 12px;
      background: rgba(47,106,49,0.06);
      color: var(--earth-700);
      border: 1px solid transparent;
      user-select: none;
    }
    .chip:hover { background: rgba(47,106,49,0.12); }
    .chip.active { background: var(--nature-700); color: white; }
    .chip .count { opacity: 0.75; margin-left: 4px; font-variant-numeric: tabular-nums; }

    /* Per-source progress strip (collapsible review card) */
    .progress-strip {
      margin: 8px 16px;
      border: 1px solid rgba(47,106,49,0.2);
      border-radius: 6px;
      background: rgba(47,106,49,0.04);
      font-size: 12px;
      display: none;
    }
    .progress-strip.visible { display: block; }
    .progress-strip .strip-header {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; cursor: default;
    }
    .progress-strip .strip-title { font-weight: 600; color: var(--earth-700); font-size: 13px; flex: 1; }
    .progress-strip .strip-date { color: var(--earth-700); font-size: 12px; }
    .progress-strip .strip-clear { color: var(--earth-700); font-size: 12px; text-decoration: none; margin-left: auto; }
    .progress-strip .strip-clear:hover { text-decoration: underline; }

    /* Auto-advance banner */
    .auto-advance-banner {
      margin: 8px 16px; padding: 12px 16px;
      background: rgba(47,106,49,0.10);
      border: 1px solid var(--nature-700);
      border-radius: 6px;
      display: none;
      font-size: 13px;
    }
    .auto-advance-banner.visible { display: block; }
    .auto-advance-banner .check { color: var(--nature-700); font-weight: 600; }
    .auto-advance-banner button {
      margin-left: 8px; padding: 6px 12px; cursor: pointer;
      background: var(--nature-700); color: white; border: none; border-radius: 4px;
    }
    .auto-advance-banner button.dismiss {
      background: white; color: var(--earth-700);
      border: 1px solid rgba(47,106,49,0.3);
    }

    /* Per-tab filter bar */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      padding: 10px 0 12px 0;
      border-top: 1px solid rgba(47, 106, 49, 0.15);
      margin-top: -1px;
    }

    main { padding: 16px 20px 100px; }
    .table-wrap {
      background: white;
      border: 1px solid rgba(47, 106, 49, 0.15);
      border-radius: 6px;
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th {
      background: var(--nature-50);
      border-bottom: 1px solid rgba(47, 106, 49, 0.25);
      padding: 7px 10px;
      text-align: left;
      font-weight: 600;
      color: var(--nature-900);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid rgba(47, 106, 49, 0.08);
      vertical-align: top;
    }
    tbody tr:nth-child(even) { background: var(--row-alt); }
    tbody tr.expanded { background: #eef7ee !important; }
    tbody td { padding: 7px 10px; }

    td.id { font-family: ui-monospace, "SF Mono", Consolas, monospace; color: var(--earth-700); white-space: nowrap; }
    td.entity { min-width: 140px; max-width: 220px; }
    td.entity .sci { font-style: italic; color: var(--nature-900); display: block; line-height: 1.25; }
    td.entity .sci a { color: var(--nature-900); text-decoration: none; }
    td.entity .sci a:hover { text-decoration: underline; }
    td.entity .common { color: var(--earth-700); font-size: 11px; display: block; line-height: 1.25; }
    td.cat { white-space: nowrap; }
    .badge {
      display: inline-block; padding: 1px 6px; border-radius: 3px;
      background: var(--nature-50); border: 1px solid rgba(47, 106, 49, 0.2);
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--nature-700); white-space: nowrap;
    }
    .badge.plantae       { background: #e8f5e9; }
    .badge.invertebrate  { background: #fff3e0; }
    .badge.vertebrate    { background: #e3f2fd; }
    .badge.fungi         { background: #fce4ec; }
    .badge.microbe       { background: #f3e5f5; }
    td.interact { font-style: italic; color: var(--earth-700); white-space: nowrap; max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
    td.quote {
      max-width: 360px; cursor: pointer; color: #333;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    td.quote::before { content: '"'; color: var(--earth-700); }
    td.quote::after  { content: '"'; color: var(--earth-700); }
    tr.expanded td.quote { white-space: normal; max-width: none; font-style: italic; }
    td.source { white-space: nowrap; max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
    td.source a { color: var(--nature-700); text-decoration: none; }
    td.source a:hover { text-decoration: underline; }
    td.page { font-family: ui-monospace, "SF Mono", Consolas, monospace; color: var(--earth-700); white-space: nowrap; text-align: right; }
    td.num { text-align: right; font-family: ui-monospace, "SF Mono", Consolas, monospace; color: var(--earth-700); }
    td.status { white-space: nowrap; }
    .pill {
      display: inline-block; padding: 1px 7px; border-radius: 9px;
      font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .pill.ai_reviewed { background: #fff8d6; color: #6a5800; }
    .pill.human_verified        { background: #d6f0d8; color: #1c5e22; }
    .pill.human_rejected        { background: #f7d6d6; color: #6e1818; }
    .pill.disputed              { background: #fae3c4; color: #6e4609; }
    td.actions { white-space: nowrap; }
    td.actions button {
      cursor: pointer; border: none; border-radius: 3px;
      padding: 3px 8px; font-size: 11px; font-weight: 500;
      margin-right: 2px; color: white;
    }
    td.actions button:disabled { opacity: 0.35; cursor: default; }
    td.actions .accept { background: var(--nature-700); }
    td.actions .accept:hover:not(:disabled) { background: var(--nature-900); }
    td.actions .reject { background: var(--red); }
    td.actions .reject:hover:not(:disabled) { background: #8a2820; }
    td.actions .flag   { background: var(--yellow); }
    td.actions .flag:hover:not(:disabled)   { background: #8a6303; }
    td.reviewer { font-size: 11px; color: var(--earth-700); white-space: nowrap; }
    td.title-cell { min-width: 220px; max-width: 360px; }
    td.title-cell a { color: var(--nature-900); text-decoration: none; }
    td.title-cell a:hover { text-decoration: underline; }
    td.title-cell .meta { color: var(--earth-700); font-size: 11px; display: block; }
    td.slug-cell { font-family: ui-monospace, "SF Mono", Consolas, monospace; color: var(--earth-700); font-size: 11px; }
    td.slug-cell a { color: var(--earth-700); text-decoration: none; }
    td.slug-cell a:hover { text-decoration: underline; }

    .pager { display: flex; gap: 8px; align-items: center; margin: 16px 0; justify-content: center; }
    .pager-info { font-size: 12px; color: var(--earth-700); }
    .pager button {
      cursor: pointer; background: white; border: 1px solid rgba(47, 106, 49, 0.2);
      border-radius: 4px; padding: 4px 10px; font-size: 12px;
    }
    .pager button:hover:not(:disabled) { border-color: var(--nature-700); }
    .pager button:disabled { opacity: 0.4; cursor: default; }

    .empty { text-align: center; padding: 60px 20px; color: var(--earth-700); }

    /* Bulk-select toolbar (Claims tab only, appears when ≥1 selected) */
    .bulk-bar {
      position: sticky;
      top: 110px;
      z-index: 4;
      background: var(--nature-100);
      border: 1px solid var(--nature-200);
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--nature-900);
    }
    .bulk-bar.hidden { display: none; }
    .bulk-bar button {
      cursor: pointer;
      border: none;
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      color: white;
    }
    .bulk-bar .accept { background: var(--nature-700); }
    .bulk-bar .reject { background: var(--red); }
    .bulk-bar .flag   { background: var(--yellow); }
    .bulk-bar .clear  { background: white; color: var(--earth-700); border: 1px solid rgba(47,106,49,0.2); }
    .bulk-bar button:hover:not(:disabled) { filter: brightness(0.9); }

    td.checkbox, th.checkbox { width: 32px; padding-left: 8px; padding-right: 4px; }
    td.checkbox input, th.checkbox input { cursor: pointer; }

    /* Entity environmental detail panel (expandable per row) */
    tr.env-detail-row td { padding: 14px 18px; background: #f1f7f0; border-bottom: 2px solid rgba(47, 106, 49, 0.2); }
    .env-section { margin-bottom: 14px; }
    .env-section h4 {
      margin: 0 0 6px; font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--nature-700); font-weight: 600;
    }
    .env-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 6px 8px;
      font-size: 11px;
      align-items: start;
    }
    .env-field {
      display: flex; flex-direction: column;
      padding: 4px 6px; background: white;
      border: 1px solid rgba(47, 106, 49, 0.12);
      border-radius: 3px;
      min-height: 0;
    }
    .env-field .label {
      font-size: 10px; color: var(--earth-700); margin-bottom: 1px;
    }
    .env-field .value {
      font-size: 12px; color: var(--nature-900);
      cursor: text; min-height: 16px; word-break: break-word;
      padding: 1px 0;
      max-height: 280px;
      overflow-y: auto;
    }
    .env-field .value.empty {
      color: #aaa; font-style: italic;
      min-height: 16px;
      padding: 1px 0;
    }
    .env-field .value:hover { background: var(--nature-50); }
    .env-field .value input.edit-input,
    .env-field .value select.edit-input { font-size: 12px; padding: 2px 4px; }

    button.env-expand {
      cursor: pointer;
      background: transparent;
      border: 1px solid rgba(47, 106, 49, 0.25);
      border-radius: 3px;
      padding: 1px 7px;
      font-size: 11px;
      color: var(--nature-700);
    }
    button.env-expand:hover { background: var(--nature-50); border-color: var(--nature-700); }
    button.env-expand.expanded { background: var(--nature-700); color: white; border-color: var(--nature-700); }

    /* Keyboard nav — focused row */
    tr.row-focused td { outline: 2px solid var(--nature-700); outline-offset: -2px; }
    .cheatsheet-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: none; align-items: center; justify-content: center; z-index: 9999;
    }
    .cheatsheet-backdrop.visible { display: flex; }
    .cheatsheet {
      background: white; border-radius: 8px; padding: 24px 32px;
      max-width: 720px; max-height: 80vh; overflow: auto;
      font-size: 13px;
    }
    .cheatsheet h2 { margin: 0 0 12px; }
    .cheatsheet h3 { margin-top: 18px; color: var(--earth-700); font-size: 13px; }
    .cheatsheet kbd {
      background: var(--earth-50, rgba(47,106,49,0.06)); border: 1px solid rgba(0,0,0,0.15);
      border-bottom-width: 2px; border-radius: 4px;
      padding: 2px 6px; font-family: monospace; font-size: 11px;
    }
    .cheatsheet table { width: 100%; border-collapse: collapse; }
    .cheatsheet td { padding: 4px 8px; vertical-align: top; }
    .cheatsheet td.binding { white-space: nowrap; width: 1%; }

    /* Inline-edit cell support */
    td.editable { cursor: text; position: relative; }
    td.editable:hover { background: rgba(47, 106, 49, 0.06); }
    td.editable:hover::after {
      content: '✎';
      position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
      color: var(--earth-700); font-size: 11px; opacity: 0.7;
    }
    td.editable.empty-cell::before {
      content: '+ add';
      color: #aaa;
      font-style: italic;
    }
    td.editable input.edit-input,
    td.editable select.edit-input {
      width: 100%; padding: 2px 4px;
      font-size: 12px; font-family: inherit;
      border: 1px solid var(--nature-700);
      border-radius: 3px;
      background: white;
      box-sizing: border-box;
    }

    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--nature-900); color: white;
      padding: 8px 14px; border-radius: 4px; font-size: 12px;
      opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 10;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--red); }

    /* ── Info tooltip icons ──────────────────────────────────────────────── */
    .info-icon {
      display: inline-block;
      width: 14px; height: 14px; line-height: 14px;
      text-align: center;
      background: rgba(47,106,49,0.10);
      color: var(--earth-700);
      border-radius: 50%;
      font-size: 10px;
      font-weight: 600;
      font-style: italic;
      cursor: pointer;
      margin-left: 4px;
      user-select: none;
      vertical-align: middle;
    }
    .info-icon:hover { background: rgba(47,106,49,0.20); }
    .info-popover {
      position: fixed;
      z-index: 9999;
      max-width: 360px;
      background: white;
      border: 1px solid rgba(47,106,49,0.3);
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.45;
      color: var(--earth-700);
    }
    .info-popover h4 {
      margin: 0 0 6px;
      font-size: 13px;
      color: var(--nature-700);
    }
    .info-popover p { margin: 4px 0; }
    .info-popover ul { margin: 4px 0 4px 18px; padding: 0; }
    .info-popover li { margin: 2px 0; }
    .info-popover code {
      background: rgba(47,106,49,0.08);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
    }
    .info-popover .close {
      float: right;
      cursor: pointer;
      color: var(--earth-700);
      font-size: 16px;
      line-height: 1;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-row1">
      <h1>AgroEco · admin review</h1>
      <span class="meta" id="status-meta">Loading…</span>
      <span style="flex:1"></span>
      <label>Reviewer: <input type="text" id="reviewer" placeholder="Your name" /></label>
      <label>Per page:
        <select id="page-size">
          <option value="25">25</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
        </select>
      </label>
    </div>
    <div class="top-tabs" id="top-tabs"></div>
    <div class="top-tab-desc" id="top-tab-desc"></div>
    <div class="ingest-picker hidden" id="ingest-picker"></div>
    <div class="progress-strip" id="progress-strip"></div>
    <div class="auto-advance-banner" id="auto-advance-banner"></div>
    <div class="tabs" id="tabs"></div>
    <div class="filter-bar" id="filter-bar"></div>
  </header>

  <main>
    <div class="bulk-bar hidden" id="bulk-bar">
      <span><strong id="bulk-count">0</strong> selected</span>
      <span style="flex:1"></span>
      <button class="accept" onclick="confirmBulk('claims', 'accept')">✓ Accept selected</button>
      <button class="reject" onclick="confirmBulk('claims', 'reject')">✕ Reject selected</button>
      <button class="flag" onclick="confirmBulk('claims', 'flag')">⚐ Flag selected</button>
      <button class="clear" onclick="clearSelection()">Clear</button>
    </div>
    <div class="bulk-bar hidden" id="bulk-bar-staging">
      <span><strong id="bulk-count-staging">0</strong> selected</span>
      <span style="flex:1"></span>
      <button class="accept" onclick="confirmBulk('staging', 'accept')">✓ Accept selected</button>
      <button class="reject" onclick="confirmBulk('staging', 'reject')">✕ Reject selected</button>
      <button class="flag"   onclick="confirmBulk('staging', 'flag')">⚐ Flag selected</button>
      <button class="clear" onclick="clearStagingSelection()">Clear</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr id="thead-row"></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div class="pager" id="pager"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const PUBLIC_BASE = 'https://agroeco.io';

    // Populated lazily when the user enters the Ingest top-tab — list of
    // sources with date + uploader subtext for the source-picker dropdown.
    let ingestSourcesList = [];

    // Populated on init from /api/admin/review/regions — list of distinct
    // regional_context values across verified claims, with counts.
    // Used to render the region-filter dropdowns on the Claims and Entities tabs.
    let regionsList = [];
    function regionOptions(selected) {
      const opts = ['<option value="">(any region)</option>']

    // ── Info-icon helper + popover logic ─────────────────────────────────────
    function infoIcon(key) {
      if (!INFO_TIPS[key]) return '';
      return `<span class="info-icon" data-tip-key="${esc(key)}" onclick="showInfoTip(event,'${esc(key)}')" title="More info">i</span>`;
    }

    window.showInfoTip = function(event, key) {
      event.stopPropagation();
      closeInfoTips();
      const tip = INFO_TIPS[key];
      if (!tip) return;
      const pop = document.createElement('div');
      pop.className = 'info-popover';
      pop.innerHTML = `<span class="close" onclick="this.parentElement.remove()">×</span><h4>${esc(tip.title || '')}</h4><div>${tip.body || ''}</div>`;
      const rect = event.target.getBoundingClientRect();
      pop.style.left = (rect.left + 18) + 'px';
      pop.style.top  = (rect.bottom + 4) + 'px';
      document.body.appendChild(pop);
      setTimeout(() => {
        const r = pop.getBoundingClientRect();
        if (r.right  > window.innerWidth  - 8) pop.style.left = (window.innerWidth  - r.width  - 8) + 'px';
        if (r.bottom > window.innerHeight - 8) pop.style.top  = (rect.top - r.height - 4) + 'px';
      }, 0);
    };

    window.closeInfoTips = function() {
      document.querySelectorAll('.info-popover').forEach(p => p.remove());
    };

    document.addEventListener('click', e => {
      if (!e.target.closest('.info-icon') && !e.target.closest('.info-popover')) closeInfoTips();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeInfoTips(); });

            : '';
          // Render the multi-critic verdict trail. critic_verdicts is a
          // newline-joined string of "critic_name|verdict|reasoning|confidence|strength"
          // rows from claim_critic_verdicts. We split it, render each
          // critic's verdict as a small badge, and pack the reasoning,
          // confidence and evidence strength into a hover tooltip per critic.
          const critics = c.critic_verdicts
            ? c.critic_verdicts.split('\n').map(line => {
                const [name, verdict, reasoning, confidenceRaw, strength] = line.split('|');
                if (!name) return '';
                const verdictClass = verdict === 'plausible' ? 'human_verified'
                  : verdict === 'implausible' ? 'human_rejected'
                  : verdict === 'uncertain' ? 'disputed'
                  : 'ai_reviewed';
                const shortName = (name || '').replace(/^(extractor-)?vouch$/, 'vouch')
                  .replace('agroecologist', 'agro').replace('plant-pathologist', 'path')
                  .replace('entomologist', 'ento').replace('soil-scientist', 'soil')
                  .replace('horticulturist', 'hort');
                const conf = confidenceRaw && confidenceRaw !== '' ? ` (conf: ${parseFloat(confidenceRaw).toFixed(2)})` : '';
                const strengthBadge = strength && strength !== '' ? `\n— evidence: ${strength}` : '';
                return `<span class="pill ${verdictClass}" style="margin-right:2px" title="${esc(name)}${conf}: ${esc(verdict)}${reasoning ? '\n— ' + esc(reasoning) : ''}${strengthBadge}">${esc(shortName)}</span>`;
              }).join('')
            : '<span style="color:#aaa">—</span>';
          const claimRowData = JSON.stringify({
            id: c.id,
            source_quote: c.source_quote,
            source_page: c.source_page,
            critic_verdicts: c.critic_verdicts,
            source_id: c.source_id,
            source_has_pdf: c.source_has_pdf,
            source_title: c.source_title,
            staging_id: c.staging_id,
            subject: c.subject_scientific_name || '',
            object: c.object_scientific_name || '',
            relation: c.interaction_type_globi || c.interaction_type_raw || '',
            region: c.regional_context,
            review_status: c.review_status
          });
          const claimRowB64 = btoa(unescape(encodeURIComponent(claimRowData)));
          return `<tr data-id="${c.id}" data-claim-row="${claimRowB64}" class="claim-row">
            <td class="checkbox"><input type="checkbox" data-claim-id="${c.id}" onchange="toggleSelect(${c.id}, this)" /></td>
            <td style="width:24px;padding:0 4px"><span class="expand-toggle" onclick="toggleClaimExpand(${c.id}, this)" style="cursor:pointer;user-select:none;color:var(--earth-700);font-weight:600;font-size:13px">&#9658;</span></td>
            <td class="id">${c.id}</td>
            <td class="status"><span class="pill ${esc(c.review_status)}">${esc(c.review_status.replace(/_/g, ' '))}</span></td>
            <td>${critics}</td>
            <td class="entity">${entityCell(c.subject_scientific_name, c.subject_common_name, c.subject_slug)}</td>
            <td class="cat">${bioBadge(c.subject_bio_category)}</td>
            <td class="editable"${cea('interaction_type_globi', 'select', GLOBI_TERMS)}>${globiTerm}</td>
            <td>${bucketLabel}</td>
            <td class="entity">${entityCell(c.object_scientific_name, c.object_common_name, c.object_slug)}</td>
            <td class="cat">${bioBadge(c.object_bio_category)}</td>
            <td class="editable ${c.regional_context ? '' : 'empty-cell'}"${cea('regional_context')}>${c.regional_context ? `<span class="badge">${esc(c.regional_context)}</span>` : ''}</td>
            <td class="quote" onclick="toggleExpand(${c.id})" title="Click to expand">${esc(c.source_quote)}</td>
            <td class="source">${sourceCell}</td>
            <td class="page editable ${c.source_page ? '' : 'empty-cell'}"${cea('source_page')}>${esc(c.source_page || '')}</td>
            <td class="reviewer">${c.reviewer_id ? esc(c.reviewer_id) : ''}${c.reviewed_at ? '<br>' + esc(c.reviewed_at.slice(0,10)) : ''}</td>
            <td class="actions">
              <button class="accept" ${isPending ? '' : 'disabled'} onclick="action(${c.id}, 'accept', this)" title="Accept">✓</button>
              <button class="reject" ${isPending ? '' : 'disabled'} onclick="action(${c.id}, 'reject', this)" title="Reject">✕</button>
              <button class="flag"   ${isPending ? '' : 'disabled'} onclick="action(${c.id}, 'flag',   this)" title="Flag">⚐</button>
            </td>
          </tr>`;
        }
      },

      // Inline-edit-aware tab below: cells render with data-edit-* attrs

      // and PATCHes /api/admin/review/sources/:id (or entities/:id).
      // ── Publish / external-push tabs (no new schema; per project_admin_restructure_decisions.md)

      published: {
        label: 'Verified',

        defaultFilters: { status: 'human_verified', region: '' },

      globi: {

      },

      trefle: {

        renderFilters: (f) => `
          <span style="font-size:12px;color:var(--earth-700);font-style:italic">

          </span>

          <button onclick="exportTrefleJson()" style="cursor:pointer;background:var(--nature-700);color:white;border:none;border-radius:4px;padding:6px 14px;font-size:12px;font-weight:500" title="Download CC-licensed plant entities in Trefle-compatible JSON">Export JSON ↓</button>`
      },

      upload: {

        endpoint: null,         // no data fetch — pure form

        renderFilters: () => '',
        columns: [],

      },

      dedupCandidates: { label: 'Candidates', custom: true, columns: [], renderRow: () => '', renderFilters: () => '', defaultFilters: {} },
      dedupLog: { label: 'Audit / Undo', custom: true, columns: [], renderRow: () => '', renderFilters: () => '', defaultFilters: {} },

      entityDedup: { label: 'Entity Dedup', custom: true, columns: [], renderRow: () => '', renderFilters: () => '', defaultFilters: {} },
      entityDedupLog: { label: 'Entity Dedup Log', custom: true, columns: [], renderRow: () => '', renderFilters: () => '', defaultFilters: {} },

      sources: {
        label: 'Sources',
        endpoint: '/api/admin/review/sources',
        defaultFilters: { source_type: '', search: '' },
        renderFilters: (f) => `
          <label>Type:
            <select name="source_type">
              <option value="" ${f.source_type === '' ? 'selected' : ''}>(any)</option>
              <option value="book" ${f.source_type === 'book' ? 'selected' : ''}>book</option>
              <option value="paper" ${f.source_type === 'paper' ? 'selected' : ''}>paper</option>
              <option value="extension" ${f.source_type === 'extension' ? 'selected' : ''}>extension</option>
              <option value="report" ${f.source_type === 'report' ? 'selected' : ''}>report</option>
            </select>
          </label>
          <label>Search:
            <input type="text" name="search" value="${esc(f.search || '')}" placeholder="title / authors / slug" />
          </label>
          <button onclick="addSource()" style="margin-left:auto;cursor:pointer;background:var(--nature-700);color:white;border:none;border-radius:4px;padding:5px 12px;font-size:12px;font-weight:500">+ Add source</button>`,
        columns: ['#', 'Slug', 'Title', 'Authors', 'Year', 'Type', 'License', 'DOI/URL', 'Claims'],
        renderRow: (s) => {
          const titleLink = s.slug
            ? `<a href="${PUBLIC_BASE}/source/${esc(s.slug)}" target="_blank">${esc(s.title)}</a>`
            : esc(s.title);
          const link = s.doi
            ? `<a href="https://doi.org/${esc(s.doi)}" target="_blank" rel="noopener">doi:${esc(s.doi.length > 24 ? s.doi.slice(0, 22) + '…' : s.doi)}</a>`
            : (s.url ? `<a href="${esc(s.url)}" target="_blank" rel="noopener">link↗</a>` : '');
          const firstAuthor = s.authors ? esc(s.authors.split(/[,;&]/)[0].trim()) : '';
          // editAttrs(field) builds the data-* attrs for inline editing.
          const ea = (field, type = 'text', selectOptions = null) => {
            const opts = selectOptions ? ` data-edit-select='${esc(JSON.stringify(selectOptions))}'` : '';
            return ` data-edit-tab="sources" data-edit-id="${s.id}" data-edit-field="${field}" data-edit-type="${type}"${opts}`;
          };
          const titleEditable = `<span class="full-title" data-full-title="${esc(s.title || '')}">${s.slug ? `<a href="${PUBLIC_BASE}/source/${esc(s.slug)}" target="_blank" onclick="event.stopPropagation()">${esc(s.title)}</a>` : esc(s.title || '')}</span>`;
          return `<tr data-id="${s.id}">
            <td class="id">${s.id}</td>
            <td class="slug-cell">${s.slug ? esc(s.slug) : '<span style="color:#aaa">—</span>'}</td>
            <td class="title-cell editable"${ea('title')}>${titleEditable}${s.publication ? `<span class="meta">${esc(s.publication)}</span>` : ''}</td>
            <td class="editable ${s.authors ? '' : 'empty-cell'}"${ea('authors')}>${esc(s.authors || '')}</td>
            <td class="num editable ${s.year ? '' : 'empty-cell'}"${ea('year', 'text')}>${esc(s.year || '')}</td>
            <td class="editable"${ea('source_type', 'select', ['', 'book', 'paper', 'extension', 'report', 'preprint', 'thesis', 'website'])}>${s.source_type ? `<span class="badge">${esc(s.source_type)}</span>` : '<span style="color:#aaa">—</span>'}</td>
            <td class="editable ${s.license ? '' : 'empty-cell'}"${ea('license')}>${esc(s.license || '')}</td>
            <td class="editable ${s.url || s.doi ? '' : 'empty-cell'}"${ea('url')}>${link || ''}</td>
            <td class="num">${s.verified_claim_count || 0}</td>
          </tr>`;
        }
      }
    };

    // Post-init: publish tabs reuse the claims/entities columns + renderers
    // (they're just filtered views over the same data, no need to duplicate
    // the rendering logic).
    tabs.published.columns      = tabs.claims.columns;
    tabs.published.renderRow    = tabs.claims.renderRow;
    tabs.globi.columns          = tabs.claims.columns;
    tabs.globi.renderRow        = tabs.claims.renderRow;
    tabs.trefle.columns         = tabs.entities.columns;
    tabs.trefle.renderRow       = tabs.entities.renderRow;

    // ── Top-level workflow groups (Ingest / Database / Publish) ──────────────
    const tabGroups = {
      ingest: {
        label: 'Ingest',
        desc: 'Add a new PDF and review what gets extracted before it enters the database.',
        subs: ['upload', 'queue', 'staging']
      },
      database: {
        label: 'Database',
        desc: 'Review and edit the entire corpus — claims, entities, sources.',
        subs: ['claims', 'entities', 'entity_traits', 'sources', 'pendingCrops', 'priority']
      },
      publish: {
        label: 'Publish',
        desc: 'Push human-verified claims live and export to GloBI / Trefle.',
        subs: ['published', 'globi', 'trefle']
      },
      dedup: {
        label: 'Dedup',
        desc: 'Human-gated deduplication: review near-duplicate cultivars and entities, approve/keep-separate, undo merges.',
        subs: ['dedupCandidates', 'dedupLog', 'entityDedup', 'entityDedupLog']
      }
    };

    // ── State ─────────────────────────────────────────────────────────────────
    const state = {
      topTab: 'database',
      tab: 'claims',
      // Ingest-only: which source the partner is currently reviewing.
      // null = "no source picked" (Ingest sub-tabs render an empty-state
      // prompt instead of fetching across all sources).
      ingestSourceId: null,
      page: 1,
      pageSize: 50,
      selectedIds: new Set(),
      filters: {
        claims:         { ...tabs.claims.defaultFilters },
        entities:       { ...tabs.entities.defaultFilters },
        entity_traits:  { ...tabs.entity_traits.defaultFilters },
        priority:       {},
        staging:        { ...tabs.staging.defaultFilters, scope: '' },
        queue:          { ...tabs.queue.defaultFilters },
        pendingCrops:   { ...tabs.pendingCrops.defaultFilters },
        sources:        { ...tabs.sources.defaultFilters },
        published:      { ...tabs.published.defaultFilters },
        globi:          { ...tabs.globi.defaultFilters },
        trefle:         { ...tabs.trefle.defaultFilters },
        upload:         {}
      },
      lastResponse: {}
    };

    // ── URL hash routing ──────────────────────────────────────────────────────
    const urlState = {
      hydrate() {
        const hash = window.location.hash.replace(/^#/, '');
        if (!hash) return false;
        const params = new URLSearchParams(hash);

        if (params.has('topTab')) state.topTab = params.get('topTab');
        if (params.has('subTab')) state.tab = params.get('subTab');
        if (params.has('source')) {
          const src = parseInt(params.get('source'), 10);
          if (Number.isFinite(src)) state.ingestSourceId = src;
        }
        if (params.has('page')) {
          const p = parseInt(params.get('page'), 10);
          if (Number.isFinite(p) && p > 0) state.page = p;
        }
        for (const [k, v] of params) {
          if (k.startsWith('filter.')) {
            const filterKey = k.slice('filter.'.length);
            const tabKey = state.tab;
            if (state.filters[tabKey]) state.filters[tabKey][filterKey] = v;
          }
        }
        return true;
      },

      build() {
        const parts = [`topTab=${encodeURIComponent(state.topTab)}`,
                       `subTab=${encodeURIComponent(state.tab)}`];
        if (state.ingestSourceId) parts.push(`source=${state.ingestSourceId}`);
        if (state.page && state.page !== 1) parts.push(`page=${state.page}`);

        const tabFilters = state.filters[state.tab] || {};
        const defaults = (tabs[state.tab] && tabs[state.tab].defaultFilters) || {};
        for (const [k, v] of Object.entries(tabFilters)) {
          if (v === '' || v == null) continue;
          if (defaults[k] === v) continue;
          parts.push(`filter.${k}=${encodeURIComponent(v)}`);
        }
        return parts.join('&');
      },

      push(method = 'replace') {
        const next = '#' + this.build();
        if (window.location.hash === next) return;
        if (method === 'push') history.pushState(null, '', next);
        else                   history.replaceState(null, '', next);
      }
    };

    window.addEventListener('popstate', () => {
      urlState.hydrate();
      applyNav();
    });

    // ── Per-source progress strip ─────────────────────────────────────────────
    const progressStrip = {
      cache: null,
      inflight: null,

      async fetch() {
        if (!state.ingestSourceId) { this.cache = null; return null; }
        if (this.inflight) return this.inflight;
        this.inflight = (async () => {
          try {
            const r = await fetch(`/api/admin/review/source-progress?source_id=${state.ingestSourceId}`);
            if (!r.ok) return null;
            return await r.json();
          } finally {
            this.inflight = null;
          }
        })();
        this.cache = await this.inflight;
        return this.cache;
      },

      render() {
        const el = document.getElementById('progress-strip');
        if (!el) return;
        if (state.topTab !== 'ingest' || !state.ingestSourceId || !this.cache) {
          el.classList.remove('visible');
          el.innerHTML = '';
          return;
        }
        const p = this.cache;
        const titleText = p.source && p.source.title ? esc(p.source.title) : `Source ${state.ingestSourceId}`;
        const addedText = (p.source && p.source.added_at)
          ? ` · added ${esc(String(p.source.added_at).slice(0, 10))}` : '';
        el.innerHTML = `
          <div class="strip-header">
            <span class="strip-title">Verifying: ${titleText}</span>
            ${addedText ? `<span class="strip-date">${addedText}</span>` : ''}
            <a href="#" class="strip-clear" onclick="setIngestSource(null);return false;">Clear selection</a>
          </div>
        `;
        el.classList.add('visible');
      }
    };

    // ── Auto-advance banner ───────────────────────────────────────────────────
    // Non-modal banner that offers "Continue to <next stage>" when the current
    // stage's pending count drops to zero for the selected source.
    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
      }[c]));
    }

    const autoAdvance = {
      evaluate() {
        const el = document.getElementById('auto-advance-banner');
        if (!el) return;
        const p = progressStrip.cache;
        if (!p || state.topTab !== 'ingest' || !state.ingestSourceId) {
          el.classList.remove('visible');
          el.innerHTML = '';
          return;
        }

        // Per-stage offers (declared in nav order)
        const offers = [
          { stage: 'queue',    sub: 'staging',  pending: p.queue.pending,          nextLabel: 'Verify',
            nextPending: p.staging.pending,      nextTotal: p.staging.total },
          { stage: 'staging',  sub: 'entities', pending: p.staging.pending,        nextLabel: 'Entities',
            nextPending: p.entities.incomplete,  nextTotal: p.entities.total },
          { stage: 'entities', sub: 'claims',   pending: p.entities.incomplete,    nextLabel: 'Claims',
            nextPending: p.claims.pending,       nextTotal: p.claims.total },
          { stage: 'claims',   sub: null,       pending: p.claims.pending,         nextLabel: null,
            nextPending: 0,                      nextTotal: 0 }
        ];
        const offer = offers.find(o => o.stage === state.tab && o.pending === 0);
        if (!offer) { el.classList.remove('visible'); el.innerHTML = ''; return; }

        const sourceTitle = (p.source && p.source.title) || `source ${p.source && p.source.id}`;
        const ctaLabel = offer.sub ? `Continue to ${offer.nextLabel} →` : 'Pick a new source ↑';
        const detail = offer.sub
          ? `Next stage: ${offer.nextTotal} ${offer.nextLabel.toLowerCase()}, ${offer.nextPending} still need attention.`
          : 'All claims for this source are reviewed.';
        el.innerHTML = `
          <span class="check">✓</span> All ${escapeHtml(offer.stage)} for "${escapeHtml(sourceTitle)}" are decided.
          <div style="margin-top:6px;color:var(--earth-700)">${escapeHtml(detail)}</div>
          <div style="margin-top:8px">
            ${offer.sub ? `<button onclick="autoAdvance.go('${escapeHtml(offer.sub)}')">${ctaLabel}</button>` : ''}
            <button class="dismiss" onclick="autoAdvance.dismiss()">Stay here</button>
          </div>`;
        el.classList.add('visible');
      },
      go(sub) {
        if (typeof setTab === 'function') {
          setTab(sub);
        } else {
          state.tab = sub;
          if (typeof urlState !== 'undefined') urlState.push('push');
          if (typeof renderTabs === 'function') renderTabs();
          if (typeof load === 'function') load();
        }
        this.dismiss();
      },
      dismiss() {
        const el = document.getElementById('auto-advance-banner');
        if (el) { el.classList.remove('visible'); el.innerHTML = ''; }
      }
    };
    window.autoAdvance = autoAdvance;

    // ── Chip-filter helpers ───────────────────────────────────────────────────
    // Generic chip-filter renderer (reused across tabs).
    // chipDef: [{ key, label, filterKey, filterValue }, ...]
    // counts: object keyed by chip.key → number
    // activeValue: current value of state.filters[tabKey][filterKey]; '' / null → All active
    function renderChipRow(tabKey, chipDef, counts, activeValue) {
      if (!chipDef.length) return '';
      const total = chipDef.reduce((s, c) => s + (counts[c.key] || 0), 0);
      const allActive = !activeValue;
      const filterKey = chipDef[0].filterKey;
      const allChip = `<span class="chip ${allActive ? 'active' : ''}"
          onclick="setChip('${tabKey}','${filterKey}','')">All <span class="count">${total}</span></span>`;
      const others = chipDef.map(c => `
          <span class="chip ${activeValue === c.filterValue ? 'active' : ''}"
                onclick="setChip('${tabKey}','${c.filterKey}','${c.filterValue}')">
            ${c.label}<span class="count">${counts[c.key] || 0}</span>
          </span>`).join('');
      return `<div class="chip-row">${allChip}${others}</div>`;
    }

    window.setChip = function(tabKey, filterKey, filterValue) {
      if (!state.filters[tabKey]) return;
      state.filters[tabKey][filterKey] = filterValue;
      state.page = 1;
      if (typeof urlState !== 'undefined') urlState.push('replace');
      load();
    };

    // Click handler for pending-links in the progress strip.
    window.jumpToStage = function(subTab, filterKey, filterVal) {
      state.tab = subTab;
      if (filterKey && state.filters[subTab]) {
        state.filters[subTab][filterKey] = filterVal;
      }
      state.page = 1;
      urlState.push('push');
      applyNav();
    };

    // Route ALL progress-strip pending-links to Staging with a scope filter.
    // This is the universal review surface for all things related to the selected source.
    window.jumpToStagingWithScope = function(scope) {
      state.topTab = 'ingest';
      state.tab = 'staging';
      state.page = 1;
      if (!state.filters.staging) state.filters.staging = { ...tabs.staging.defaultFilters };
      state.filters.staging.scope = scope || '';
      state.filters.staging.ai_vouch_status = '';
      state.filters.staging.review_status = '';
      urlState.push('push');
      applyNav();
    };

    // Re-fetch the strip after any successful mutation.
    window.markSourceDirty = async function() {
      if (state.topTab !== 'ingest' || !state.ingestSourceId) return;
      await progressStrip.fetch();
      progressStrip.render();
      if (typeof autoAdvance !== 'undefined') autoAdvance.evaluate();
    };

    // ── Staging bulk-select state ────────────────────────────────────────────
    const stagingSelected = new Set();

    // ── Bulk-select on Claims ────────────────────────────────────────────────
    function toggleSelect(id, checkbox) {
      if (checkbox.checked) state.selectedIds.add(id);
      else state.selectedIds.delete(id);
      updateBulkBar();
    }
    function toggleSelectAll(headerCheckbox) {
      const checked = headerCheckbox.checked;
      document.querySelectorAll('input[data-claim-id]').forEach(cb => {
        cb.checked = checked;
        const id = parseInt(cb.dataset.claimId, 10);
        if (checked) state.selectedIds.add(id);
        else state.selectedIds.delete(id);
      });
      updateBulkBar();
    }
    function clearSelection() {
      state.selectedIds.clear();
      document.querySelectorAll('input[data-claim-id]').forEach(cb => { cb.checked = false; });
      const sa = document.getElementById('select-all');
      if (sa) sa.checked = false;
      updateBulkBar();
    }
    function updateBulkBar() {
      const bar = document.getElementById('bulk-bar');
      const n = state.selectedIds.size;
      document.getElementById('bulk-count').textContent = n;
      bar.classList.toggle('hidden', n === 0 || state.tab !== 'claims');
    }
    async function bulkAction(action) {
      if (state.selectedIds.size === 0) return;
      const reviewer = $('reviewer').value.trim() || null;
      const ids = Array.from(state.selectedIds);
      try {
        const res = await fetch('/api/admin/review/bulk', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids, action, reviewer })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        toast(`Bulk ${action}: ${data.updated}/${data.requested} updated → ${data.review_status}`);
        clearSelection();
        load();
        await markSourceDirty();
      } catch (err) {
        toast(`Error: ${err.message}`, true);
      }
    }

    // ── Bulk-select on Staging ───────────────────────────────────────────────
    window.toggleStagingRow = function(id, cb) {
      if (cb.checked) stagingSelected.add(id); else stagingSelected.delete(id);
      updateStagingBulkBar();
    };
    window.toggleSelectAllStaging = function(cb) {
      document.querySelectorAll('#rows tr').forEach(tr => {
        const id = parseInt(tr.dataset.id, 10);
        const rowCb = tr.querySelector('input.row-select-staging');
        if (rowCb) rowCb.checked = cb.checked;
        if (Number.isFinite(id)) {
          if (cb.checked) stagingSelected.add(id); else stagingSelected.delete(id);
        }
      });
      updateStagingBulkBar();
    };
    window.clearStagingSelection = function() {
      stagingSelected.clear();
      document.querySelectorAll('#rows input.row-select-staging').forEach(cb => cb.checked = false);
      const sa = document.getElementById('select-all-staging');
      if (sa) sa.checked = false;
      updateStagingBulkBar();
    };
    function updateStagingBulkBar() {
      const bar = document.getElementById('bulk-bar-staging');
      if (!bar) return;
      const n = stagingSelected.size;
      const cntEl = document.getElementById('bulk-count-staging');
      if (cntEl) cntEl.textContent = n;
      if (n > 0 && state.tab === 'staging') bar.classList.remove('hidden');
      else                                   bar.classList.add('hidden');
    }

    // ── confirmBulk — centralized gate for staging + claims ─────────────────
    window.confirmBulk = async function(tabKey, action) {
      const sel = tabKey === 'staging' ? stagingSelected : state.selectedIds;
      const ids = Array.from(sel);
      if (ids.length === 0) return;

      if (ids.length >= 2) {
        const verb = action === 'accept' ? 'Accept' : action === 'reject' ? 'Reject' : 'Flag';
        const ok = window.confirm(`${verb} ${ids.length} ${tabKey} rows?\n\nThis cannot be undone.`);
        if (!ok) return;
      }

      const url = tabKey === 'staging' ? '/api/admin/staging/bulk' : '/api/admin/review/bulk';
      let res;
      try {
        const reviewer = $('reviewer') ? $('reviewer').value.trim() || null : null;
        res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids, action, ...(reviewer ? { reviewer } : {}) })
        });
      } catch (err) {
        alert(`Network error during bulk ${action}: ${err.message}`);
        return;
      }
      if (!res.ok) {
        const body = await res.text().catch(() => '');
        alert(`Bulk ${action} failed (${res.status}): ${body}`);
        return;
      }
      const data = await res.json().catch(() => ({}));
      toast(`Bulk ${action}: ${data.updated ?? ids.length} updated`);

      if (tabKey === 'staging') clearStagingSelection();
      else clearSelection();
      if (typeof load === 'function') await load();
      if (typeof markSourceDirty === 'function') await markSourceDirty();
    };

    // ── Inline editing (Sources, Entities) ───────────────────────────────────
    let editingCell = null;
    function editCell(td) {
      if (editingCell) return; // one at a time
      const tab = td.dataset.editTab;
      const id = td.dataset.editId;
      const field = td.dataset.editField;
      const type = td.dataset.editType || 'text';
      const selectOptionsRaw = td.dataset.editSelect;
      // Read current value: prefer data-full-title if present (for title cells),
      // otherwise fall back to the cell's text content (stripped).
      let current = '';
      const fullTitleEl = td.querySelector('[data-full-title]');
      if (fullTitleEl) current = fullTitleEl.dataset.fullTitle;
      else current = td.textContent.trim().replace(/^—$/, '').replace(/^\+ add$/, '');

      const originalHTML = td.innerHTML;
      let input;
      if (selectOptionsRaw) {
        const opts = JSON.parse(selectOptionsRaw);
        input = document.createElement('select');
        input.className = 'edit-input';
        for (const opt of opts) {
          const o = document.createElement('option');
          o.value = opt;
          o.textContent = opt || '(none)';
          if (opt === current) o.selected = true;
          input.appendChild(o);
        }
      } else {
        input = document.createElement('input');
        input.className = 'edit-input';
        input.type = type;
        input.value = current;
      }
      td.innerHTML = '';
      td.appendChild(input);
      editingCell = { td, originalHTML, input, tab, id, field };
      input.focus();
      if (input.select) input.select();

      input.addEventListener('blur', commitEdit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { e.preventDefault(); cancelEdit(); }
      });
    }
    function cancelEdit() {
      if (!editingCell) return;
      editingCell.td.innerHTML = editingCell.originalHTML;
      editingCell = null;
    }
    async function commitEdit() {
      if (!editingCell) return;
      const { td, originalHTML, input, tab, id, field } = editingCell;
      const newVal = input.value;
      editingCell = null;
      try {
        const res = await fetch(`/api/admin/review/${tab}/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ [field]: newVal })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        await res.json();
        toast(`Saved ${tab} #${id}: ${field}`);
        // Reload the current page to re-render with the new value.
        load();
        await markSourceDirty();
      } catch (err) {
        toast(`Save failed: ${err.message}`, true);
        td.innerHTML = originalHTML;
      }
    }
    // Delegated click handler for editable cells. Matches any element with
    // data-edit-field — so `td.editable` cells in the spreadsheet AND
    // `span.value.editable` cells in the env-detail panel both work.
    document.addEventListener('click', e => {
      const el = e.target.closest('[data-edit-field]');
      if (!el || el.querySelector('.edit-input')) return;
      // Don't intercept clicks on links or buttons inside the cell.
      if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') return;
      editCell(el);
    });

    async function toggleEnvDetail(id, btn) {
      const entityRow = btn.closest('tr.entity-row');
      const next = entityRow.nextElementSibling;
      // Already expanded? Collapse.
      if (next && next.classList.contains('env-detail-row') && parseInt(next.dataset.id, 10) === id) {
        next.remove();
        btn.classList.remove('expanded');
        return;
      }
      // Fetch + render.
      btn.classList.add('expanded');
      btn.disabled = true;
      try {
        const res = await fetch(`/api/admin/review/entities/${id}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const e = data.item;
        const detailRow = document.createElement('tr');
        detailRow.className = 'env-detail-row';
        detailRow.dataset.id = id;
        const colCount = tabs[state.tab].columns.length;
        const td = document.createElement('td');
        td.colSpan = colCount;
        const ALLOWED_BIO_CATEGORIES = ['plantae', 'invertebrate', 'vertebrate', 'fungi', 'microbe'];
        const bc = e.bio_category;
        if (!ALLOWED_BIO_CATEGORIES.includes(bc)) {
          td.innerHTML = `<div style="padding:16px;color:var(--earth-700,#78350f);font-style:italic">` +
            `No environmental fields apply to entities with bio_category=&#39;${esc(bc || '(unset)')}&#39;. ` +
            `Set the entity&#39;s bio_category to plantae / invertebrate / vertebrate / fungi / microbe to see relevant fields.</div>`;
        } else {
          td.innerHTML = ENV_SECTIONS.map(section => {
            const visibleFields = section.fields.filter(([, , , , applicable]) => {
              if (!applicable || applicable.length === 0) return true; // defensive default
              return applicable.includes(bc);
            });
            if (visibleFields.length === 0) return '';
            const cells = visibleFields.map(([field, label, type, options]) => {
              const val = e[field];
              const isEmpty = val == null || val === '';
              const display = isEmpty ? '+ add' : esc(val);
              const selectAttr = options ? ` data-edit-select='${esc(JSON.stringify(options))}'` : '';

              <span class="label">${esc(label)}</span>

    async function addSource() {
      const title = prompt('Source title (required):');
      if (!title || !title.trim()) return;
      const authors = prompt('Authors (e.g. "Pedigo, L.P., Rice, R.M."):', '') || '';
      const year = prompt('Year (optional):', '') || '';
      const source_type = prompt('Source type — book / paper / extension / report / preprint / website (optional):', '') || '';
      const url = prompt('URL or DOI (optional):', '') || '';
      const license = prompt('License — CC-BY / CC-BY-SA / proprietary / etc. (optional):', '') || '';
      try {
        const res = await fetch('/api/admin/review/sources', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: title.trim(), authors, year, source_type, url, license })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }
        const data = await res.json();
        toast(`Created source #${data.id} (slug: ${data.created?.slug || '—'})`);
        if (state.tab === 'sources') load();
      } catch (err) {
        toast(`Error: ${err.message}`, true);
      }
    }

    // ── Centralized navigation lifecycle ─────────────────────────────────────
    // Single source of truth for "the navigation state changed; refresh everything that depends on it."
    // All navigation handlers (setTab, jumpToStagingWithScope, reviewSourceFromQueue,
    // jumpToStage, viewInDatabase, popstate) must call this — never call individual render fns ad-hoc.
    function applyNav() {
      if (typeof renderTopTabs === 'function') renderTopTabs();
      if (typeof renderTabs === 'function') renderTabs();
      if (typeof renderIngestPicker === 'function') renderIngestPicker();
      if (typeof renderHeader === 'function') renderHeader();
      if (typeof renderFilterBar === 'function') renderFilterBar();
      // Recompute strip + banner on every nav so .visible never goes stale
      progressStrip.render();
      if (typeof autoAdvance !== 'undefined') autoAdvance.evaluate();
      return load();
    }

    // Race counter: ensures an out-of-order fetch can't overwrite a newer load's result.
    let activeLoadId = 0;

    // ── Render ────────────────────────────────────────────────────────────────
    function renderTopTabs() {
      $('top-tabs').innerHTML = Object.entries(tabGroups).map(([key, g]) => `
        <button class="top-tab-btn ${state.topTab === key ? 'active' : ''}" onclick="setTopTab('${key}')">
          ${esc(g.label)}${infoIcon('top:' + key)}
        </button>
      `).join('');
      $('top-tab-desc').textContent = tabGroups[state.topTab]?.desc || '';
    }

    function renderTabs() {
      const subs = tabGroups[state.topTab]?.subs || [];
      $('tabs').innerHTML = subs.map(key => {
        const t = tabs[key];
        if (!t) return '';
        return `<button class="tab-btn ${state.tab === key ? 'active' : ''}" onclick="setTab('${key}')">${esc(t.label)}${infoIcon('sub:' + key)}</button>`;
      }).join('');
    }

    async function setIngestSource(rawId) {
      if (typeof autoAdvance !== 'undefined') autoAdvance.dismiss();
      const id = (rawId === null || rawId === '' || rawId === 'null') ? null : parseInt(rawId, 10);

      state.page = 1;

    function renderCriticsTrail(criticVerdictsString) {
      const verdicts = (criticVerdictsString || '').split('\n').filter(Boolean);
      if (!verdicts.length) return '<div style="color:#aaa;font-style:italic;font-size:12px">no critic verdicts available</div>';
      return verdicts.map(line => {
        const [name, verdict, reasoning, confidence, strength] = line.split('|');
        if (!name) return '';
        const conf = confidence && confidence !== '' ? ` <span style="color:var(--earth-700)">(conf ${parseFloat(confidence).toFixed(2)})</span>` : '';
        const str = strength && strength !== '' ? ` <span style="color:var(--earth-700)">[${esc(strength)}]</span>` : '';
        const cls = verdict === 'plausible' ? 'human_verified' : verdict === 'implausible' ? 'human_rejected' : verdict === 'uncertain' ? 'disputed' : 'ai_reviewed';
        return `<div style="margin:4px 0">
          <span class="pill ${cls}">${esc(name)}: ${esc(verdict)}</span>${conf}${str}
          ${reasoning ? `<div style="margin:2px 0 0 8px;color:var(--earth-700);font-style:italic;font-size:12px">&#8212; ${esc(reasoning)}</div>` : ''}
        </div>`;
      }).join('');
    }

    // Build the &search= fragment for PDF.js viewer iframes. Uses first ~60
    // chars (trimmed to a word boundary). PDF.js viewer reads plain text after
    // &search= — no quote-wrapping needed.
    function pdfSearchParam(quote) {
      if (!quote) return '';
      let q = String(quote).trim().replace(/^["'“”‘’]+|["'“”‘’]+$/g, '');
      if (!q) return '';
      const cut = Math.min(60, q.length);
      let snippet = q.slice(0, cut);
      const lastSpace = snippet.lastIndexOf(' ');
      if (lastSpace > 30) snippet = snippet.slice(0, lastSpace);
      return snippet ? `&search=${encodeURIComponent(snippet)}` : '';
    }

    // Build a full PDF.js viewer URL wrapping the raw PDF endpoint.
    function pdfjsUrl(sourceId, page, searchPart) {
      const fileUrl = encodeURIComponent('/api/admin/literature/' + sourceId + '/pdf');
      // Mozilla viewer fragment params: phrase=true (whole phrase, not split words),
      // highlightAll=true (mark every match, not just first), pagemode=none (no sidebar by default).
      return `/pdfjs/web/viewer.html?file=${fileUrl}#page=${page}${searchPart}&highlightAll=true&phrase=true&pagemode=none`;
    }

    function renderPdfBlock(data) {
      if (!data.source_has_pdf || !data.source_id) {
        return `<div>
          <div style="font-size:11px;font-weight:600;color:var(--earth-700);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Source PDF</div>
          <div style="color:#aaa;font-style:italic;font-size:12px">no PDF available for this source</div>
        </div>`;
      }
      const dataB64 = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
      const searchPart = pdfSearchParam(data.source_quote);
      return `<div style="display:flex;flex-direction:column;min-height:0">
        <div style="font-size:11px;font-weight:600;color:var(--earth-700);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;flex:0 0 auto">Source PDF (page ${esc(String(data.source_page || '?'))})</div>
        <div style="position:relative;flex:1 1 auto;min-height:500px;border:1px solid rgba(47,106,49,0.2);border-radius:4px;overflow:hidden;background:white">
          <iframe src="${pdfjsUrl(data.source_id, data.source_page || 1, searchPart)}" style="width:100%;height:100%;border:0;display:block" title="Source page"></iframe>
          <button onclick="enlargeSourcePdf(${data.source_id}, ${data.source_page || 1}, '${dataB64}')" style="position:absolute;top:6px;right:6px;background:rgba(47,106,49,0.9);color:white;border:none;border-radius:3px;padding:3px 8px;font-size:11px;cursor:pointer">&#9645; Enlarge</button>
        </div>
      </div>`;
    }

    function renderClaimDetail(data, opts = {}) {

        ? `<a href="#" onclick="viewStagingFromClaim(${data.staging_id});return false;" style="color:var(--earth-700)">View in Verify &#8594;</a>`

      const summaryRows = [
