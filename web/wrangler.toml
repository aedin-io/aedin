name = "agroeco"
pages_build_output_dir = "dist"

# @astrojs/cloudflare SSR worker uses node: built-ins (fs, child_process, os,
# events) from Astro's server runtime; nodejs_compat + a >=2024-09-23 date make
# workerd provide them (and auto-alias unprefixed `fs`/`child_process`).
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "agroeco"
database_id = "c78eddce-2770-465c-86fb-cfc6dbe45ae3"

# Waitlist admin notifications post to a Discord webhook (free, no Workers-Paid
# plan needed). The webhook URL is the Pages secret WAITLIST_WEBHOOK_URL — set
# via `wrangler pages secret put`, never committed. See web/src/pages/api/waitlist.ts.
